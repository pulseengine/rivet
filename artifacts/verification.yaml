      document rendering and REQ-036 config.js version switcher stub.
    tags: [testing, export, documents, swe-5]
    links:
      - type: verifies
        target: REQ-035
      - type: verifies
        target: REQ-036
      - type: satisfies
        target: REQ-014
    fields:
      phase: phase-2
