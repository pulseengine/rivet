artifacts:
  - id: TEST-001
    type: feature
    title: Store and model unit tests
    status: approved
    description: >
      Unit tests for the diff, document, and store modules. Verifies artifact
      storage, retrieval, upsert, by-type indexing, YAML frontmatter parsing,
      document reference extraction, HTML rendering, and structural diff
      computation between store snapshots.
    tags: [testing, swe-4]
    links:
      - type: verifies
        target: REQ-001
      - type: satisfies
        target: REQ-014
    fields:
      phase: phase-1
      acceptance-criteria:
        - "Given a YAML artifact file, When rivet loads it, Then the artifact is stored with correct ID and title"
        - "Given a store with artifacts, When querying by type, Then only artifacts of that type are returned"
        - "Given two store snapshots, When computing diff, Then added/removed/modified artifacts are identified"

