  - id: FEAT-122
    type: feature
    title: Windows cross-platform support for hook installation
    status: approved
    description: >
      install_hook() in rivet-cli/src/main.rs gates the POSIX
      set_permissions(0o755) call behind #[cfg(unix)], so the Windows
      build no longer fails with E0433/E0599 on
      std::os::unix::fs::PermissionsExt. On Windows, Git-Bash runs
      hooks via its own shim regardless of NTFS executable bits, so
      skipping the chmod is semantically correct. Unblocks the v0.4.0
      cross-platform release binary for Windows.
    tags: [platform, windows, bugfix]
    links:
      - type: satisfies
        target: REQ-060
      - type: implements
        target: DD-055
      - type: satisfies
        target: REQ-051
    fields:
      baseline: v0.4.0
      acceptance-criteria:
        - "Given a Windows build of rivet, When cargo build --release runs, Then the build succeeds"
        - "Given rivet init --hooks on Windows, When run in a git repo, Then the hook files are created under .git/hooks/ without a permissions error"
        - "Given rivet init --hooks on Linux/macOS, When run, Then hooks are still installed with 0o755 (no regression)"
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-7
      timestamp: 2026-04-19T12:00:00Z

  # ── Requirements ────────────────────────────────────────────────────

  - id: REQ-060
    type: requirement
    title: Cross-platform binary support
    status: approved
    description: >
      Rivet must build and run on Linux, macOS, and Windows. Platform-
      specific code must be gated behind cfg attributes rather than
      assumed. The release workflow must publish binaries for all
      three platforms. Integration tests that exercise platform-
      specific paths (file permissions, path separators, process
      spawning) must be gated behind the matching cfg so they compile
      on every supported target.
    tags: [platform, cross-platform, release]
    links:
      - type: satisfies
        target: REQ-007
    fields:
      priority: must
      category: non-functional
      baseline: v0.4.0
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-7
      timestamp: 2026-04-19T12:00:00Z
