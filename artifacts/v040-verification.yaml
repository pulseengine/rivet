  - id: FEAT-117
    type: feature
    title: Operation-sequence property tests for the artifact store
    status: approved
    description: >
      Three proptest properties in
      rivet-core/tests/proptest_operations.rs fuzz random sequences of
      insert/upsert/validate operations against store invariants.
      Shrinks failing cases to minimal reproducers. Catches ordering
      bugs, index-consistency violations, and state-corruption
      regressions that unit tests miss because they exercise pre-chosen
      call sequences. Runs 1000 cases per property in CI via
      PROPTEST_CASES=1000.
    tags: [verification, proptest, property-based, fuzzing, phase-3]
    links:
      - type: satisfies
        target: REQ-030
      - type: verifies
        target: REQ-004
      - type: verifies
        target: REQ-014
      - type: implements
        target: DD-052
    fields:
      baseline: v0.4.0
      acceptance-criteria:
        - "Given an arbitrary sequence of insert/upsert/validate operations, When the sequence runs against a store, Then all documented invariants hold at every step"
        - "Given a failing sequence, When proptest shrinks, Then the minimal reproducer is reported"
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-7
      timestamp: 2026-04-19T12:00:00Z

