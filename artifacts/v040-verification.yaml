# verification pyramid, STPA extraction fixes, Zola export, Windows build.
#
# Authored retroactively on 2026-04-19 to close the audit gap where
# v0.4.0 merged without artifacts covering the real release content.
# v040-features.yaml was last touched 2026-04-12 and described the
# variant/PLE work (FEAT-106..114), not the verification work.
artifacts:

  # ── Design decisions ────────────────────────────────────────────────

  - id: DD-052
    type: design-decision
    title: Four-layer verification pyramid (Rocq / Verus / Kani / dynamic)
    status: approved
    description: >
      Core validation and extraction algorithms are verified at four
      layers, each addressing a different failure mode.
      Layer 1 — Rocq/coq-of-rust metamodel proofs (schemas/links consistency).
      Layer 2 — Verus SMT functional correctness (validation soundness).
      Layer 3 — Kani bounded model checking (panic freedom over bounded input).
      Layer 4 — proptest + differential + mutation testing (coverage of
      behaviour not expressible in formal contracts).
      No single layer is sufficient: Rocq proves the schema model, Verus
      proves the algorithm against its contract, Kani proves the actual
      compiled Rust does not panic, and dynamic testing catches gaps in
      the specs themselves.
    tags: [verification, formal-methods, tool-qualification]
    links:
      - type: satisfies
        target: REQ-030
      - type: satisfies
        target: REQ-012
    fields:
      rationale: >
        Tool qualification for ISO 26262 TCL 1 requires evidence that
        the tool produces correct output under all inputs it is exposed
        to. Any one verification technique has known blind spots:
        Kani cannot prove properties beyond a bounded depth, Verus
        requires manual loop invariants that drift from the real code,
        Rocq proves the model but not the implementation, and tests
        cover only exercised paths. Stacking the four layers gives
        coverage that compounds: a bug that slips past one is typically
        caught by another. The v0.4.0 release wires all four into CI
        so every PR runs them (though Kani/Verus/Rocq jobs are
        non-blocking — see DD-054).
      alternatives: >
        (1) Tests only. Rejected: cannot claim tool qualification, no
        coverage of unexercised edge cases. (2) Kani only. Rejected:
        bounded depth means unbounded-input algorithms (parsers) aren't
        covered past the bound. (3) Full Verus proofs of everything.
        Rejected: proof-engineering cost is prohibitive, many Rust
        patterns (trait objects, async) aren't yet supported. (4) One
        external formal-verification consultant. Rejected: doesn't
        scale to a daily-commit OSS project; proofs must live with the
        code.
      source-ref: >
        AWS s2n-tls uses a similar pyramid: SAW proofs for crypto
        primitives, Dafny for protocol state machines, libFuzzer for
        wire format. The Rust compiler ships with Kani, Miri,
        proptest, and compiletest in the same stack. docs/verification.md
        describes the rivet instantiation.
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-7
      timestamp: 2026-04-19T12:00:00Z

  - id: DD-053
    type: design-decision
    title: Suffix-based yaml-section matching for sub-artifact discovery
    status: approved
    description: >
      Schemas may declare yaml-section-suffix in addition to the existing
      yaml-section. Any top-level YAML key that ends with the declared
      suffix (e.g. *-ucas) matches the artifact type. This replaces the
      previous hardcoded section-name list that silently dropped
      artifacts in projects using custom section names.
    tags: [schema, yaml, extraction, stpa]
    links:
      - type: satisfies
        target: REQ-002
      - type: satisfies
        target: REQ-010
    fields:
      rationale: >
        Real STPA projects group UCAs by controller (e.g.
        isle-rewriter-ucas, tower-supervisor-ucas). The pre-v0.4.0
        extractor only matched an exact "ucas" key, so these projects
        reported 0 UCAs despite having dozens defined. Switching to a
        suffix-based match keeps the canonical "ucas" working while
        covering any per-controller grouping the project chooses,
        without the schema having to enumerate every possible section
        name. The same mechanism generalises to other STPA artifact
        types with per-controller grouping (e.g. *-scenarios).
      alternatives: >
        (1) Keep the exact-match list, tell projects to rename their
        sections. Rejected: breaks dogfooding for projects like loom
        that predate rivet. (2) Full regex. Rejected: overkill,
        anchor-escaping footguns, slower. (3) Per-project config file
        listing extra section names. Rejected: duplicates information
        already implicit in the suffix convention and creates a
        second source of truth.
      source-ref: >
        See rivet-core/src/yaml_hir.rs suffix_patterns (introduced
        2026-04-14 in 9a27a53) and schemas/stpa.yaml uca type.
        Closes #129.
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-7
      timestamp: 2026-04-19T12:00:00Z

  - id: DD-055
    type: design-decision
    title: Gate platform-specific syscalls behind cfg attributes, not runtime detection
    status: approved
    description: >
      Platform-specific code paths (POSIX permissions, fork/exec,
      symlinks, signal handlers) are gated at compile time with
      #[cfg(unix)] / #[cfg(windows)] rather than probed at runtime.
      The default is "do the cross-platform thing unconditionally";
      the cfg branch only adds POSIX-specific extras when they apply.
    tags: [platform, cross-platform, architecture]
    links:
      - type: satisfies
        target: REQ-060
      - type: satisfies
        target: REQ-007
    fields:
      rationale: >
        Compile-time gating catches platform bugs at build time on
        each target, not in runtime logs on a user's machine. Runtime
        probes (cfg!(unix), std::env::consts::OS) still compile the
        POSIX-only type paths on Windows, producing "unresolved
        import std::os::unix" errors — exactly the bug fixed in
        aa706fc. The v0.4.0 Windows release binary failed precisely
        because install_hook unconditionally imported PermissionsExt.
        Gating with #[cfg(unix)] removes the import on non-Unix
        targets and forces the author to think about the non-Unix
        code path explicitly.
      alternatives: >
        (1) Runtime OS detection with cfg!(unix). Rejected: the
        std::os::unix imports still need to compile on Windows,
        defeating the purpose. (2) Wrapper crate abstracting
        permissions. Rejected: overkill for one call site; introduces
        a dependency to hide a three-line cfg branch. (3) Unix-only
        builds. Rejected: we ship a Windows binary; dropping Windows
        is not an option.
      source-ref: >
        rivet-cli/src/main.rs install_hook() (post-aa706fc state).
        PR #153 retroactively links here.
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-7
      timestamp: 2026-04-19T12:00:00Z

  - id: DD-054
    type: design-decision
    title: Non-blocking (continue-on-error) framing for formal-verification CI jobs
    status: approved
    description: >
      The Kani, Verus, and Rocq CI jobs are wired with
      continue-on-error: true. A failing formal job does not block
      merges; a failing test/clippy/audit job still does. This is a
      deliberate trade-off while the underlying toolchains (rules_verus,
      rules_rocq_rust, kani-verifier GitHub Action) stabilise on
      GitHub Actions runners.
    tags: [ci, formal-methods, workflow, verification]
    links:
      - type: satisfies
        target: REQ-012
      - type: satisfies
        target: REQ-030
    fields:
      rationale: >
        Rivet depends on bleeding-edge formal-verification toolchains
        whose Bazel+nix CI recipes have known transient failures
        (cache misses, sandbox issues, occasional rules_verus
        incompatibilities with nightly Rust). Blocking merges on these
        would grind development to a halt for reasons unrelated to
        correctness. Running them non-blocking still gives (a) regression
        signal (PR author sees the red check), (b) trend data in the
        Actions history, and (c) a path to flipping the gate once the
        toolchains stabilise. Honest caveat: as of v0.4.0 none of the
        three formal jobs have executed green end-to-end on CI; the
        current state is "wired up, actively stabilising". This
        decision and the caveat are documented so future auditors are
        not misled by the green overall CI badge.
      alternatives: >
        (1) Hard gate from day one. Rejected: would have blocked the
        v0.4.0 release on toolchain flakes unrelated to the artifacts
        being verified. (2) Run formal jobs only on schedule (nightly).
        Rejected: loses per-PR feedback, signal becomes stale.
        (3) Omit from CI entirely until stable. Rejected: removes the
        forcing function that drives stabilisation and removes
        evidence for tool qualification that the proofs exist.
      source-ref: >
        .github/workflows/ci.yml jobs kani, verus, rocq (all carry
        continue-on-error: true as of v0.4.0).
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-7
      timestamp: 2026-04-19T12:00:00Z

