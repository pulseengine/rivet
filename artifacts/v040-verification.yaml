    status: approved
    description: >
      The Kani proof suite in rivet-core/src/proofs.rs grew from 15 to
      27 #[kani::proof] harnesses covering the core public API that
      handles user-supplied input: commit trailer parsing
      (parse_commit_type, extract_artifact_ids, expand_artifact_range,
      parse_trailers), store upsert panic-freedom and retrievability
