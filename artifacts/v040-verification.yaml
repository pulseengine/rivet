      mutation helpers (prefix_for_type, next_id, validate_link),
      markdown rendering (render_markdown panic-freedom,
      strip_html_tags invariant that output contains no angle brackets),
      plus the previously existing 15 harnesses. Each harness proves
      panic-freedom over all bounded inputs via exhaustive symbolic
      execution.
