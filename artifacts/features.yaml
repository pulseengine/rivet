artifacts:
  - id: FEAT-001
    type: feature
    title: STPA YAML adapter
    status: approved
    description: >
      Import artifacts from meld's STPA YAML format (losses, hazards,
      system-constraints, control-structure, ucas, controller-constraints).
    tags: [stpa, adapter, phase-1]
    links:
      - type: satisfies
        target: REQ-002
      - type: satisfies
        target: REQ-001
    fields:
      phase: phase-1

  - id: FEAT-002
    type: feature
    title: Generic YAML adapter
    status: approved
    description: >
      Import/export artifacts in canonical generic YAML format with
      explicit type, links array, and fields map.
    tags: [adapter, phase-1]
    links:
      - type: satisfies
        target: REQ-001
    fields:
      phase: phase-1

  - id: FEAT-003
    type: feature
    title: Schema loading and merging
    status: approved
    description: >
      Load schema files from YAML, merge multiple schemas, and provide
      lookup for artifact types, link types, and inverse mappings.
    tags: [schema, phase-1]
    links:
      - type: satisfies
        target: REQ-010
    fields:
      phase: phase-1

  - id: FEAT-004
    type: feature
    title: Link graph with petgraph
    status: approved
    description: >
      Build directed graph from artifact links, compute forward/backward
      links, detect broken links, find orphans, check cycles.
    tags: [validation, phase-1]
    links:
      - type: satisfies
        target: REQ-004
      - type: implements
        target: DD-002
    fields:
      phase: phase-1

  - id: FEAT-005
    type: feature
    title: Validation engine
    status: approved
    description: >
      Validate artifacts against schema: known types, required fields,
      allowed values, link cardinality, link target types, traceability
      rules (forward and backward).
    tags: [validation, phase-1]
    links:
      - type: satisfies
        target: REQ-004
    fields:
      phase: phase-1

  - id: FEAT-006
    type: feature
    title: Traceability matrix computation
    status: approved
    description: >
      Compute source-to-target traceability matrices with coverage
      percentages. Support forward and backward directions.
    tags: [reporting, phase-1]
    links:
      - type: satisfies
        target: REQ-004
    fields:
      phase: phase-1

  - id: FEAT-007
    type: feature
    title: CLI validate command
    status: approved
    description: >
      Full project validation from trace.yaml — load schemas, import
      artifacts from all sources, build link graph, run validation.
    tags: [cli, phase-1]
    links:
      - type: satisfies
        target: REQ-007
    fields:
      phase: phase-1

  - id: FEAT-008
    type: feature
    title: CLI stpa command
    status: approved
    description: >
      Direct STPA validation without trace.yaml — point at an STPA
      directory and validate against STPA schema.
    tags: [cli, stpa, phase-1]
    links:
      - type: satisfies
        target: REQ-007
      - type: satisfies
        target: REQ-002
    fields:
      phase: phase-1

  - id: FEAT-009
    type: feature
    title: HTTP serve with HTMX dashboard
    status: approved
    description: >
      axum HTTP server serving an HTMX-powered dashboard for browsing
      artifacts, viewing traceability matrices, and validation results.
    tags: [ui, phase-2]
    links:
      - type: satisfies
        target: REQ-007
      - type: implements
        target: DD-005
    fields:
      phase: phase-2

  - id: FEAT-010
    type: feature
    title: ReqIF 1.2 adapter
    status: approved
    description: >
      Import/export adapter for OMG ReqIF 1.2 XML format.
    tags: [interchange, phase-2]
    links:
      - type: satisfies
        target: REQ-005
    fields:
      phase: phase-2

  - id: FEAT-011
    type: feature
    title: OSLC client for bidirectional sync
    status: draft
    description: >
      OSLC RM/QM client for syncing artifacts with Polarion, DOORS,
      and codebeamer. Support TRS for incremental sync.
    tags: [oslc, sync, phase-3]
    links:
      - type: satisfies
        target: REQ-006
      - type: implements
        target: DD-001
    fields:
      phase: phase-3

  - id: FEAT-012
    type: feature
    title: WASM adapter runtime
    status: draft
    description: >
      Load and execute WASM component adapters at runtime using
      the WIT-defined interface.
    tags: [wasm, extensibility, phase-3]
    links:
      - type: satisfies
        target: REQ-008
      - type: implements
        target: DD-004
    fields:
      phase: phase-3

  - id: FEAT-013
    type: feature
    title: Property-based tests (proptest)
    status: approved
    description: >
      Proptest strategies for store, schema, link graph, and validation.
      Covers SWE.4 unit verification with randomized inputs.
    tags: [testing, phase-1]
    links:
      - type: satisfies
        target: REQ-014
    fields:
      phase: phase-1

  - id: FEAT-014
    type: feature
    title: Integration test suite
    status: approved
    description: >
      Cross-module integration tests: dogfood validation, generic YAML
      roundtrip, schema merge, traceability matrix, query filters.
      Covers SWE.5 integration verification.
    tags: [testing, phase-1]
    links:
      - type: satisfies
        target: REQ-014
    fields:
      phase: phase-1

  - id: FEAT-015
    type: feature
    title: Criterion benchmarks
    status: approved
    description: >
      Performance benchmarks for store insert/lookup, schema loading,
      link graph build, validation, and matrix computation at
      100/1000/10000 artifact scales.
    tags: [testing, performance, phase-1]
    links:
      - type: satisfies
        target: REQ-013
      - type: implements
        target: DD-009
    fields:
      phase: phase-1

  - id: FEAT-016
    type: feature
    title: ASPICE 4.0 schema alignment
    status: approved
    description: >
      Updated aspice.yaml schema to v4.0: renamed types (unit-verification,
      sw-integration-verification, sw-verification, sys-integration-verification,
      sys-verification, verification-execution, verification-verdict),
      expanded method values (8 verification methods), added
      verification-criteria to requirement types.
    tags: [schema, aspice, phase-1]
    links:
      - type: satisfies
        target: REQ-015
      - type: implements
        target: DD-010
    fields:
      phase: phase-1

  - id: FEAT-017
    type: feature
    title: Cybersecurity schema (SEC.1-4)
    status: approved
    description: >
      New cybersecurity.yaml schema with 10 artifact types covering
      TARA (asset, threat-scenario, risk-assessment), SEC.1 (cybersecurity-goal,
      cybersecurity-req), SEC.2 (cybersecurity-design), SEC.3
      (cybersecurity-implementation), SEC.4 (cybersecurity-verification).
      Includes 2 link types and 10 traceability rules.
    tags: [schema, cybersecurity, phase-1]
    links:
      - type: satisfies
        target: REQ-016
      - type: implements
        target: DD-010
    fields:
      phase: phase-1

  - id: FEAT-018
    type: feature
    title: AADL adapter (spar Layer 1)
    status: approved
    description: >
      Import AADL architecture models via spar CLI JSON output. Converts
      spar component types, implementations, and analysis diagnostics
      into rivet aadl-component and aadl-analysis-result artifacts.
    tags: [adapter, aadl, phase-2]
    links:
      - type: satisfies
        target: REQ-001
      - type: satisfies
        target: REQ-005
    fields:
      phase: phase-2

  - id: FEAT-019
    type: feature
    title: AADL architecture dogfood (rivet self-model)
    status: approved
    description: >
      Model rivet's own system and software architecture as AADL
      components in arch/. Three packages: RivetSystem (top-level),
      RivetAdapters (extensibility), RivetDashboard (serve/UI).
      Architecture artifacts trace to requirements via allocated-from.
    tags: [aadl, architecture, dogfood, phase-2]
    links:
      - type: satisfies
        target: REQ-001
    fields:
      phase: phase-2

  - id: FEAT-020
    type: feature
    title: AADL browser rendering (spar WASM)
    status: draft
    description: >
      Render AADL component diagrams in the dashboard using a spar WASM
      module compiled for the browser. Provides interactive visualization
      of system/software architecture with drill-down into subcomponents.
    tags: [aadl, wasm, ui, phase-3]
    links:
      - type: satisfies
        target: REQ-008
      - type: satisfies
        target: REQ-007
    fields:
      phase: phase-3

  - id: FEAT-021
    type: feature
    title: Embedded schemas
    status: approved
    description: >
      Schemas compiled into the binary via include_str! with fallback
      loading when the schemas/ directory is not found on disk. Enables
      zero-configuration operation without requiring schema files to be
      shipped alongside the binary.
    tags: [schema, distribution, phase-2]
    links:
      - type: satisfies
        target: REQ-010
    fields:
      phase: phase-2

  - id: FEAT-022
    type: feature
    title: "rivet docs command"
    status: approved
    description: >
      Built-in searchable documentation system with topic-based browsing,
      grep-style search across all docs, and --format json output for
      machine consumption. Provides offline-first help without external
      documentation sites.
    tags: [cli, docs, phase-2]
    links:
      - type: satisfies
        target: REQ-007
    fields:
      phase: phase-2

  - id: FEAT-023
    type: feature
    title: "rivet schema command"
    status: approved
    description: >
      Schema introspection commands (list, show, links, rules) that let
      users explore loaded schemas from the CLI. Supports --format json
      for agent and tooling integration.
    tags: [cli, schema, phase-2]
    links:
      - type: satisfies
        target: REQ-007
      - type: satisfies
        target: REQ-010
    fields:
      phase: phase-2

  - id: FEAT-024
    type: feature
    title: "rivet context command"
    status: approved
    description: >
      Generates .rivet/agent-context.md containing project state, coverage
      summaries, active validation rules, and example artifact IDs. Designed
      to give AI coding agents the context they need to work effectively
      with rivet-managed projects.
    tags: [cli, agent, phase-2]
    links:
      - type: satisfies
        target: REQ-007
    fields:
      phase: phase-2

  - id: FEAT-025
    type: feature
    title: "--format json on all commands"
    status: approved
    description: >
      Machine-readable JSON output envelope available on all CLI commands
      (validate, list, stats, matrix, diff, coverage, schema, docs).
      Enables agents and CI pipelines to consume rivet output
      programmatically.
    tags: [cli, agent, phase-2]
    links:
      - type: satisfies
        target: REQ-007
    fields:
      phase: phase-2

  - id: FEAT-026
    type: feature
    title: "rivet init --preset command"
    status: approved
    description: >
      Schema-aware project scaffolding with presets (dev, aspice, stpa,
      cybersecurity, aadl). Generates rivet.yaml, directories, and example
      artifacts matching the chosen domain schema.
    tags: [cli, schema, phase-2]
    links:
      - type: satisfies
        target: REQ-007
      - type: satisfies
        target: REQ-010
    fields:
      phase: phase-2

  - id: FEAT-027
    type: feature
    title: Syntax highlighting in dashboard
    status: approved
    description: >
      Server-side YAML and bash syntax highlighting in the source viewer
      and documentation pages. Rendered as annotated HTML spans without
      requiring client-side JavaScript highlighting libraries.
    tags: [ui, dashboard, phase-2]
    links:
      - type: satisfies
        target: REQ-007
    fields:
      phase: phase-2

  - id: FEAT-028
    type: feature
    title: Help and Docs dashboard section
    status: approved
    description: >
      Dashboard section providing a schema browser, link type reference,
      validation rules summary, and doc topic viewer. Gives users a
      graphical interface for exploring schemas and documentation
      alongside their artifacts.
    tags: [ui, dashboard, docs, phase-2]
    links:
      - type: satisfies
        target: REQ-007
    fields:
      phase: phase-2

  - id: FEAT-029
    type: feature
    title: "rivet commit-msg-check subcommand"
    status: draft
    description: >
      Pre-commit hook entry point that validates a single commit message
      file. Parses conventional-commit type for exemption, checks for
      skip trailer, extracts artifact IDs from git trailers, and
      validates they exist in the artifact store. Provides fuzzy-match
      suggestions on typos.
    tags: [cli, git, traceability, phase-3]
    links:
      - type: satisfies
        target: REQ-017
      - type: satisfies
        target: REQ-018
    fields:
      phase: phase-3

  - id: FEAT-030
    type: feature
    title: "rivet commits subcommand"
    status: draft
    description: >
      History analysis command that parses git log trailers, classifies
      commits (linked, orphan, exempt, broken-ref), and produces five
      reports: linked commits, broken references, orphan commits,
      artifact commit coverage, and unimplemented artifacts. Supports
      --since, --range, --json, and --strict flags.
    tags: [cli, git, traceability, phase-3]
    links:
      - type: satisfies
        target: REQ-017
      - type: satisfies
        target: REQ-019
    fields:
      phase: phase-3

  - id: FEAT-031
    type: feature
    title: Configurable trailer-to-link-type mapping
    status: draft
    description: >
      Configuration in rivet.yaml that maps git trailer keys (Implements,
      Fixes, Verifies, Satisfies, Refs) to existing schema link types.
      Includes exempt-types list, skip-trailer token, traced-paths for
      orphan detection, and trace-exempt-artifacts whitelist.
    tags: [config, git, traceability, phase-3]
    links:
      - type: satisfies
        target: REQ-017
    fields:
      phase: phase-3

  - id: FEAT-032
    type: feature
    title: Ephemeral commit node injection into link graph
    status: draft
    description: >
      At analysis time, parsed commit data is injected as ephemeral
      nodes into the petgraph link graph, wired to referenced artifacts
      via the configured link types. Enables coverage computation,
      reachability queries, and dashboard visualization without
      materializing commit YAML files.
    tags: [core, git, traceability, phase-3]
    links:
      - type: satisfies
        target: REQ-017
      - type: implements
        target: DD-012
    fields:
      phase: phase-3
