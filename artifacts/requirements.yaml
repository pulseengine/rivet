  - id: REQ-051
    type: requirement
    title: CI-enforced traceability (hooks are convenience only)
    status: draft
    description: >
      The CI pipeline must include rivet commits and rivet validate as
      required checks, independent of local git hooks. Git hooks (commit-msg,
      pre-commit) are convenience tooling that can be bypassed via
      --no-verify. The system documentation must explicitly state that
      hooks do not provide security assurance — only CI enforcement does.
      A rivet validate --check-hooks flag should report whether hooks are
      installed, but hook absence must not block local development.
    tags: [ci, hooks, security, tool-qualification]
    links:
      - type: constraint-satisfies
        target: SC-TQ-006
      - type: constraint-satisfies
