  - id: REQ-041
    type: requirement
    title: S-expression query and constraint language
    status: draft
    description: >
      The system must provide a single s-expression-based language for
      artifact filtering, traceability queries, feature model constraints,
      and variant-scoped validation. The language must support predicates
      over artifact fields (type, status, tags, custom fields), logical
      connectives (and, or, not, implies, excludes), quantifiers (forall,
      exists) over artifact sets, link traversal predicates (linked-by,
      linked-from, reachable-from), and aggregation (count, ratio). The
      same syntax must be usable in CLI --filter flags, schema traceability
      rules, feature model constraints, and binding validation rules. No
      alternative syntax or sugar — one canonical form.
    tags: [core, query, s-expression]
    links:
      - type: constraint-satisfies
        target: SC-VAR-004
    fields:
      priority: must
      category: functional
      baseline: v0.4.0
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-6
      timestamp: 2026-04-12T12:00:00Z

  - id: REQ-042
    type: requirement
    title: Feature model for product line engineering
    status: draft
    description: >
      The system must support FODA-style feature models that describe the
      logical problem space of a product line. Feature models define a
      tree of features with group types (mandatory, optional, alternative,
      or) and cross-tree constraints expressed as s-expressions (implies,
      excludes, requires). Feature models are stored as YAML artifacts
      separate from implementation artifacts, maintaining the separation
      between logical (problem space) and implementation (solution space)
      concerns. Feature models must be validatable independently — the
      constraint set must be satisfiable.
    tags: [variant, ple, feature-model]
    fields:
      priority: must
      category: functional
      baseline: v0.4.0
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-6
      timestamp: 2026-04-12T12:00:00Z

  - id: REQ-043
    type: requirement
    title: Variant configuration with constraint solving
    status: draft
    description: >
      The system must support named variant configurations that select a
      subset of features from a feature model. A constraint solver must
      propagate implications (selecting feature A forces feature B via
      constraints), detect conflicts (mutually exclusive selections), and
      validate that the final feature set satisfies all cross-tree
      constraints. Invalid configurations must produce clear diagnostics
      identifying which constraints are violated. The solver must use
      propositional logic (boolean SAT) at minimum, with optional
      first-order extensions (forall/exists over feature sets) for
      advanced constraints.
    tags: [variant, ple, constraint-solver]
    links:
      - type: constraint-satisfies
        target: SC-VAR-002
      - type: constraint-satisfies
        target: SC-VAR-006
    fields:
      priority: must
      category: functional
      baseline: v0.4.0
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-6
      timestamp: 2026-04-12T12:00:00Z

  - id: REQ-044
    type: requirement
    title: Feature-to-artifact binding model
    status: draft
    description: >
      The system must support a binding model that maps features from the
      logical feature model to implementation artifacts and source code
      globs. Bindings are stored in separate YAML files, maintaining the
      three-layer separation (feature model / variant config / binding).
      Each feature can bind to zero or more artifact IDs and zero or more
      source file glob patterns. Validation must detect: unbound features
      (feature with no artifacts), unbound artifacts (artifacts not mapped
      to any feature), and stale bindings (referencing deleted artifacts
      or non-existent source paths).
    tags: [variant, ple, binding]
    links:
      - type: constraint-satisfies
        target: SC-VAR-003
      - type: constraint-satisfies
        target: SC-VAR-005
    fields:
      priority: must
      category: functional
      baseline: v0.4.0
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-6
      timestamp: 2026-04-12T12:00:00Z

  - id: REQ-045
    type: requirement
    title: Per-variant validation and coverage
    status: draft
    description: >
      The system must validate traceability and coverage independently for
      each variant configuration. Given a variant, the system derives the
      effective feature set, collects all bound artifacts, and validates
      that traceability chains are complete within that subset. Coverage
      reports must be per-variant. An --all-variants mode must validate
      every defined variant independently and report per-variant results.
      A variant that passes validation when the union of all artifacts
      passes must still fail if its own subset has broken traceability.
    tags: [variant, validation, coverage]
    links:
      - type: constraint-satisfies
        target: SC-VAR-001
      - type: constraint-satisfies
        target: SC-VAR-007
    fields:
      priority: must
      category: functional
      baseline: v0.4.0
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-6
      timestamp: 2026-04-12T12:00:00Z

  - id: REQ-046
    type: requirement
    title: Variant-scoped CLI and API commands
    status: draft
    description: >
      All relevant CLI commands must accept --variant flags to scope
      operations to a specific product configuration. This includes
      validate, coverage, matrix, list, stats, impact, export, and the
      dashboard API endpoints. The --variant flag composes with existing
      --type and --status filters. rivet validate without --variant
      validates the union (all artifacts). rivet validate --variant X
      validates only the subset bound to variant X's features.
    tags: [variant, cli, api]
    fields:
      priority: should
      category: functional
      baseline: v0.4.0
    provenance:
      created-by: ai-assisted
      model: claude-opus-4-6
      timestamp: 2026-04-12T12:00:00Z

  - id: REQ-047
    type: requirement
    title: MCP mutation audit logging
    status: draft
    description: >
      Every MCP write operation (rivet_add, rivet_modify, rivet_link,
      rivet_unlink, rivet_remove) must produce a structured JSON log entry
      containing: tool name, artifact ID, fields changed, old value,
      new value, timestamp, and MCP session ID. The log must be append-only
      and written to a configurable path (default: .rivet/mcp-audit.jsonl).
      This enables forensic analysis of AI agent activity and rollback of
      unintended changes. Without audit logging, a prompt-injected agent's
      modifications cannot be detected or reversed.
    tags: [mcp, security, audit, tool-qualification]
    links:
      - type: constraint-satisfies
        target: SC-TQ-005
      - type: constraint-satisfies
        target: SSC-TQ-002
