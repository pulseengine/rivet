  - id: REQ-052
    type: requirement
    title: Variant solver fuzz testing
    status: draft
    description: >
      The feature model constraint solver must be tested with randomly
      generated feature models (proptest) to verify: (a) solver never
      panics, (b) solver result is consistent with brute-force enumeration
      for small models (≤10 features), (c) every resolved variant satisfies
      all constraints when re-checked. This addresses the gap between the
      12 hand-written unit tests and the combinatorial space of real
      feature models.
