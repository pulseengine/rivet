  - id: REQ-031
    type: requirement
    title: Schema-validated artifact mutation from CLI
    status: approved
    description: >
      The CLI must provide commands to create, modify, remove, link, and
      unlink artifacts directly, with full schema validation at write time.
      All mutations must validate the artifact ID is unique (or exists for
      modify), the type exists in the loaded schema, required fields are
      present, link targets exist, link types are valid for the source and
      target types, and status values are in the allowed set. The CLI must
      write valid YAML that preserves existing file formatting and comments
      where possible. This eliminates the need for external agents or manual
      YAML editing to maintain artifacts correctly.
    tags: [cli, mutation, validation, safety]
    links:
      - type: satisfies
        target: SC-1
      - type: satisfies
        target: SC-2
      - type: constraint-satisfies
        target: SC-2
