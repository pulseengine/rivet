      model: claude-opus-4-6
      timestamp: 2026-04-13T12:00:00Z

  - id: REQ-048
    type: requirement
    title: Regex complexity bounds in s-expression evaluator
    status: draft
    description: >
      The matches predicate in the s-expression evaluator must enforce
      a size limit on compiled regex patterns (via regex::RegexBuilder::
      size_limit) and a match timeout to prevent ReDoS attacks. Invalid
      or oversized patterns must produce a clear diagnostic rather than
      hanging. Default size limit: 1MB. Default match timeout: 1 second.
    tags: [security, s-expression, tool-qualification]
    links:
