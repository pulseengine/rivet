  - id: REQ-023
    type: requirement
    title: Conditional validation rules
    status: approved
    description: >
      The validation engine must support conditional rules where field
      requirements or link cardinality depend on the value of another field.
      For example, an artifact with status "approved" must have a non-empty
      verification-criteria field, or an artifact with safety level ASIL_B
      must have mitigated_by links. This enables safety-critical constraint
      enforcement that static per-type validation cannot express.
      Contradictory conditional rules must be detected at schema load time.
    tags: [validation, schema, safety]
