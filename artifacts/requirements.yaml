artifacts:
  - id: REQ-001
    type: requirement
    title: Text-file-first artifact management
    status: approved
    description: >
      All lifecycle artifacts are stored as YAML files in git repositories.
      No database or external service required for core operation.
    tags: [core]
    fields:
      priority: must
      category: functional

  - id: REQ-002
    type: requirement
    title: STPA artifact support
    status: approved
    description: >
      Support STPA methodology artifacts: losses, hazards, sub-hazards,
      system constraints, control structure, UCAs, controller constraints,
      and loss scenarios with proper link semantics.
    tags: [stpa, safety]
    fields:
      priority: must
      category: functional

  - id: REQ-003
    type: requirement
    title: Automotive SPICE V-model traceability
    status: approved
    description: >
      Support full ASPICE V-model artifact types from stakeholder requirements
      through system/software requirements, architecture, design, and testing
      with bidirectional traceability rules.
    tags: [aspice, automotive]
    fields:
      priority: must
      category: functional

  - id: REQ-004
    type: requirement
    title: Validation engine
    status: approved
    description: >
      Validate link integrity, coverage completeness, required fields,
      allowed values, and traceability rules. Report diagnostics with
      severity levels (error, warning, info).
    tags: [core, validation]
    fields:
      priority: must
      category: functional

  - id: REQ-005
    type: requirement
    title: ReqIF 1.2 import/export
    status: draft
    description: >
      Support OMG ReqIF 1.2 XML format for cross-organization requirements
      interchange. Import ReqIF into trace artifacts, export trace artifacts
      to ReqIF.
    tags: [interchange, reqif]
    fields:
      priority: should
      category: interface

  - id: REQ-006
    type: requirement
    title: OSLC-based tool synchronization
    status: draft
    description: >
      Bidirectional sync with Polarion, DOORS, and codebeamer via OSLC
      (Open Services for Lifecycle Collaboration) rather than per-tool
      REST adapters. Support RM, QM, CM domains.
    tags: [oslc, sync, interchange]
    fields:
      priority: should
      category: interface

  - id: REQ-007
    type: requirement
    title: CLI and serve pattern
    status: approved
    description: >
      Provide a CLI binary for validation, querying, and reporting.
      Support an HTTP serve mode (axum + HTMX) for dashboard visualization.
      No Tauri or desktop GUI.
    tags: [core, ui]
    fields:
      priority: must
      category: functional

  - id: REQ-008
    type: requirement
    title: WASM component adapters
    status: approved
    description: >
      Support pluggable adapters as WASM components via WIT interface.
      Adapters can import/export artifacts for custom formats.
    tags: [extensibility, wasm]
    fields:
      priority: should
      category: functional

  - id: REQ-009
    type: requirement
    title: Test results as release evidence
    status: draft
    description: >
      Tie test execution results (JUnit XML, coverage reports) to
      GitHub releases as per-version evidence. Support fetching and
      caching from release assets.
    tags: [testing, evidence]
    fields:
      priority: should
      category: functional

  - id: REQ-010
    type: requirement
    title: Schema-driven validation
    status: approved
    description: >
      Artifact types, fields, link constraints, and traceability rules
      are defined in mergeable YAML schemas. The tool validates artifacts
      against loaded schemas.
    tags: [core, schema]
    fields:
      priority: must
      category: functional

  - id: REQ-011
    type: requirement
    title: Rust edition 2024 with MSRV 1.85
    status: approved
    description: >
      Use Rust edition 2024. Maintain minimum supported Rust version of 1.85.
    tags: [toolchain]
    fields:
      priority: must
      category: constraint

  - id: REQ-012
    type: requirement
    title: Comprehensive CI quality gates
    status: approved
    description: >
      CI pipeline must include fmt, clippy -D warnings, tests, security audit,
      cargo-deny, code coverage, Miri, proptest, supply chain verification,
      and MSRV check.
    tags: [ci, quality]
    fields:
      priority: must
      category: non-functional

  - id: REQ-013
    type: requirement
    title: Performance benchmarks with KPI baselines
    status: approved
    description: >
      Criterion benchmarks for core operations (store, link graph, validation,
      matrix) at multiple artifact scales (100, 1000, 10000). Results serve
      as performance KPI baselines and regression detection.
    tags: [testing, performance]
    fields:
      priority: must
      category: non-functional

  - id: REQ-014
    type: requirement
    title: ASPICE SWE.4/5/6 test structure
    status: approved
    description: >
      Test suite organized to mirror ASPICE verification levels.
      SWE.4 unit verification (proptest, Miri), SWE.5 integration
      verification (cross-module tests), SWE.6 qualification testing
      (full pipeline validation, benchmark KPIs).
    tags: [testing, aspice]
    fields:
      priority: must
      category: non-functional

  - id: REQ-015
    type: requirement
    title: ASPICE 4.0 aligned schemas
    status: approved
    description: >
      Schema definitions must align with Automotive SPICE v4.0 process
      reference model. SWE.5 is "Software Component Verification and
      Integration Verification", SWE.6 is "Software Verification".
      Use "verification measure" terminology instead of "test".
      Expanded method values (static-analysis, formal-verification,
      simulation, inspection, walkthrough). Verification-criteria field
      on requirement types.
    tags: [aspice, schema]
    fields:
      priority: must
      category: functional

  - id: REQ-016
    type: requirement
    title: Cybersecurity schema (ISO 21434 / ASPICE SEC.1-4)
    status: approved
    description: >
      Support automotive cybersecurity engineering artifacts aligned with
      ISO/SAE 21434 and ASPICE v4.0 SEC.1-4 processes. Cover TARA
      (assets, threats, risk assessment), cybersecurity goals/requirements,
      cybersecurity design, implementation, and verification.
    tags: [cybersecurity, aspice, schema]
    fields:
      priority: should
      category: functional

  - id: REQ-017
    type: requirement
    title: Commit-to-artifact traceability
    status: approved
    description: >
      The system must parse git commit trailers and link them to artifacts
      at runtime, injecting ephemeral commit nodes into the link graph.
      Must support configurable trailer-to-link-type mapping and produce
      five report types: linked commits, broken references, orphan commits,
      artifact commit coverage, and unimplemented artifacts.
    tags: [core, traceability, git]
    fields:
      priority: must
      category: functional

  - id: REQ-018
    type: requirement
    title: Commit message validation at commit time
    status: approved
    description: >
      The system must validate commit messages via a pre-commit hook,
      ensuring non-exempt commits reference at least one valid artifact
      ID in git trailers. Must support conventional-commit type exemptions
      and an explicit skip trailer for opt-out.
    tags: [core, validation, git]
    fields:
      priority: must
      category: functional

  - id: REQ-019
    type: requirement
    title: Orphan commit detection
    status: approved
    description: >
      The system must identify commits that modify files in configured
      traced paths without referencing any artifact. Must support
      path-based configuration for traced vs. exempt directories and
      an artifact whitelist for known-unimplemented items.
    tags: [core, traceability, git]
    fields:
      priority: must
      category: functional

  - id: REQ-020
    type: requirement
    title: Cross-repository artifact linking via prefixed IDs
    status: draft
    description: >
      Rivet projects must be able to declare external dependencies on other
      rivet repositories and reference their artifacts using prefix:ID syntax.
    tags: [cross-repo, traceability]
    fields:
      priority: must
      category: functional

  - id: REQ-021
    type: requirement
    title: Distributed baselining via convention tags
    status: draft
    description: >
      Multiple rivet repositories must be able to form consistent baselines
      using git tags without requiring a central platform repository.
    tags: [cross-repo, baseline]
    fields:
      priority: should
      category: functional

  - id: REQ-022
    type: requirement
    title: Single-binary WASM asset embedding
    status: draft
    description: >
      The rivet binary must optionally embed all WASM and JavaScript assets
      so it can be distributed as a single self-contained executable.
    tags: [packaging, wasm]
    fields:
      priority: should
      category: functional
