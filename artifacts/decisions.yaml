artifacts:
  - id: DD-001
    type: design-decision
    title: OSLC over per-tool REST adapters
    status: approved
    description: >
      Use OSLC (Open Services for Lifecycle Collaboration) as the integration
      protocol for Polarion, DOORS, and codebeamer instead of writing
      per-tool REST adapters.
    tags: [architecture, oslc]
    links:
      - type: satisfies
        target: REQ-006
    fields:
      baseline: v0.1.0
      rationale: >
        OSLC is an OASIS standard that Polarion, DOORS, and codebeamer
        already support natively. One adapter handles all tools. Per-tool
        adapters would multiply maintenance burden and break on API changes.
      alternatives: >
        Per-tool REST adapters (Polarion REST, DOORS DNG API). Rejected
        because each requires separate auth, pagination, and schema mapping.
      diagram: |
        graph LR
          A[Rivet Core] -->|OSLC| B[Polarion]
          A -->|OSLC| C[DOORS]
          A -->|OSLC| D[codebeamer]
          style A fill:#e8f4fd,stroke:#0550ae
          style B fill:#f0f0f0,stroke:#666
          style C fill:#f0f0f0,stroke:#666
          style D fill:#f0f0f0,stroke:#666
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-002
    type: design-decision
    title: petgraph for link graph operations
    status: approved
    description: >
      Use the petgraph crate for building and querying the artifact link graph
      (cycle detection, reachability, orphan detection).
    tags: [architecture]
    links:
      - type: satisfies
        target: REQ-004
    fields:
      baseline: v0.1.0
      rationale: >
        petgraph is a mature, well-tested Rust graph library. It provides
        efficient algorithms for cycle detection, topological sort, and
        reachability queries that we need for link validation.
      alternatives: >
        Custom adjacency list implementation. Rejected because graph
        algorithms are subtle and petgraph is well-proven.
      source-ref: rivet-core/src/links.rs:1
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-003
    type: design-decision
    title: Mergeable YAML schemas
    status: approved
    description: >
      Schemas are YAML files that can be merged (common + stpa, common + aspice).
      Each schema file defines artifact types, link types, and traceability rules.
    tags: [architecture, schema]
    links:
      - type: satisfies
        target: REQ-010
      - type: satisfies
        target: REQ-002
      - type: satisfies
        target: REQ-003
    fields:
      baseline: v0.1.0
      source-ref: rivet-core/src/schema.rs:1
      rationale: >
        Merging allows a base common schema to be extended by domain-specific
        schemas without duplication. Projects pick which schemas they need.
      alternatives: >
        Single monolithic schema. Rejected because different projects need
        different subsets (STPA-only, ASPICE-only, or both).
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-004
    type: design-decision
    title: WIT-based WASM adapter interface
    status: approved
    description: >
      Define the adapter interface using WIT (WASM Interface Types) so that
      adapters can be compiled as WASM components and loaded at runtime.
    tags: [architecture, wasm]
    links:
      - type: satisfies
        target: REQ-008
    fields:
      baseline: v0.1.0
      rationale: >
        WIT provides a language-agnostic interface definition. Adapters can
        be written in any language that compiles to WASM components, not
        just Rust. The same trait is mirrored as a native Rust trait.
      alternatives: >
        Plugin via dynamic libraries (.so/.dylib). Rejected due to ABI
        fragility and platform-specific builds.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-005
    type: design-decision
    title: axum + HTMX serve pattern
    status: approved
    description: >
      Use axum HTTP server with HTMX for the dashboard, following the
      temper project's pattern. No Tauri or SPA framework.
    tags: [architecture, ui]
    links:
      - type: satisfies
        target: REQ-007
    fields:
      baseline: v0.1.0
      rationale: >
        axum is already a workspace dependency. HTMX keeps the frontend
        simple (server-rendered HTML fragments). No JS build toolchain
        needed. Follows the proven temper/probot pattern.
      alternatives: >
        Tauri desktop app. Rejected per user preference — CLI + serve
        is simpler and works over SSH.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-006
    type: design-decision
    title: Flat crate structure
    status: approved
    description: >
      Use a flat module structure (rivet-core, rivet-cli) rather than
      deeply nested module trees. Follow modern Rust AST-style patterns.
    tags: [architecture]
    links:
      - type: satisfies
        target: REQ-001
    fields:
      baseline: v0.1.0
      rationale: >
        Flat structures are easier to navigate and understand. Modern
        Rust projects favor fewer nesting levels with clear module
        boundaries at the crate level.
      alternatives: >
        Deep module hierarchy (rivet-core/src/domain/stpa/model/...).
        Rejected because it adds navigation overhead without benefit
        at this project scale.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-007
    type: design-decision
    title: Test results tied to GitHub releases
    status: approved
    description: >
      Test execution results (JUnit XML, coverage LCOV) are packaged
      and uploaded as GitHub release assets. The CI release-results job
      creates a tar.gz with test-results, coverage, and metadata JSON.
    tags: [testing, ci, evidence]
    links:
      - type: satisfies
        target: REQ-009
    fields:
      baseline: v0.1.0
      rationale: >
        GitHub releases are immutable, versioned, and fetchable via API.
        Tying test evidence to releases creates append-only per-version
        records. No separate artifact server needed.
      alternatives: >
        Separate S3/GCS bucket for test evidence. Rejected because it
        adds infrastructure and GitHub releases are already available.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-008
    type: design-decision
    title: Rust edition 2024 with comprehensive CI
    status: approved
    description: >
      Use Rust edition 2024 with MSRV 1.85. CI enforces fmt, clippy
      -D warnings, tests, RustSec audit, cargo-deny, code coverage,
      Miri, proptest, cargo-vet supply chain, and MSRV check.
    tags: [toolchain, ci]
    links:
      - type: satisfies
        target: REQ-011
      - type: satisfies
        target: REQ-012
    fields:
      baseline: v0.1.0
      rationale: >
        Edition 2024 brings the latest language features. The CI pipeline
        mirrors ASPICE SWE.4-6 verification levels: unit tests (proptest,
        Miri), integration tests (cargo test), and qualification gates
        (security audit, supply chain, coverage thresholds).
      alternatives: >
        Minimal CI with just tests. Rejected because safety-critical
        tooling requires the same rigor it enforces on its users.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-009
    type: design-decision
    title: Criterion benchmarks as KPI baselines
    status: approved
    description: >
      Use criterion.rs for performance benchmarks. Benchmark store
      operations, link graph building, validation, and matrix computation
      at 100/1000/10000 artifact scales to establish KPI baselines.
    tags: [testing, performance]
    links:
      - type: satisfies
        target: REQ-013
    fields:
      baseline: v0.1.0
      rationale: >
        Criterion provides statistical analysis, regression detection,
        and HTML reports. Benchmarks at multiple scales catch O(n^2)
        regressions. Results serve as SWE.4/5 performance evidence.
      alternatives: >
        Manual timing with std::time::Instant. Rejected because it
        lacks statistical rigor and regression detection.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-010
    type: design-decision
    title: ASPICE 4.0 verification terminology and composable cybersecurity schema
    status: approved
    description: >
      Update aspice.yaml to v4.0 terminology: rename artifact types from
      *-test to *-verification, expand method values, add verification-criteria.
      Cybersecurity (SEC.1-4, ISO 21434) is a separate composable schema
      file rather than embedded in aspice.yaml.
    tags: [schema, aspice, cybersecurity]
    links:
      - type: satisfies
        target: REQ-015
      - type: satisfies
        target: REQ-016
    fields:
      baseline: v0.1.0
      rationale: >
        ASPICE 4.0 broadened "testing" to "verification measures" — the
        schema should reflect this. Cybersecurity as a separate schema
        follows the composable merge pattern (common + aspice + cybersecurity)
        so projects can opt in without forcing cybersecurity types on
        safety-only projects.
      alternatives: >
        Keep old test terminology for backward compatibility. Rejected
        because the schema is pre-1.0 and alignment with the standard
        is more valuable than backward compatibility at this stage.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-011
    type: design-decision
    title: Git trailers over inline regex for commit-artifact references
    status: approved
    description: >
      Use standard git trailers (footer key-value pairs) for linking
      commits to artifacts, rather than inline regex parsing of commit
      message bodies (e.g., [FEAT-007] Jira-style).
    tags: [architecture, git, traceability]
    links:
      - type: satisfies
        target: REQ-017
    fields:
      baseline: v0.2.0-dev
      rationale: >
        Git trailers are a well-supported standard, parseable via
        git log --format='%(trailers)', git interpret-trailers, and
        programmatic APIs. They separate traceability metadata from
        the commit description. Inline regex is fragile and ambiguous
        (brackets in code snippets, prose references).
      alternatives: >
        Inline regex parsing of [ARTIFACT-ID] patterns (Jira-style).
        Rejected because regex is fragile and cannot distinguish
        intentional references from incidental mentions.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-012
    type: design-decision
    title: Runtime graph integration over materialized commit YAML
    status: approved
    description: >
      Commit data is injected as ephemeral nodes into the petgraph link
      graph at analysis time, rather than materializing commit artifacts
      as YAML files on disk.
    tags: [architecture, git, traceability]
    links:
      - type: satisfies
        target: REQ-017
    fields:
      baseline: v0.2.0-dev
      rationale: >
        Git is the single source of truth for commit data. Materializing
        commits to YAML creates a redundant data store that drifts from
        git history. The link graph is already rebuilt from scratch on
        each rivet invocation, so ephemeral commit nodes fit naturally.
      alternatives: >
        rivet sync-commits writing commit YAML files to a commits/
        directory. Rejected because it creates thousands of redundant
        files and requires ongoing sync discipline.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-013
    type: design-decision
    title: Dual opt-out for commit traceability enforcement
    status: approved
    description: >
      Non-essential commits opt out of trailer requirements via two
      mechanisms: conventional-commit type exemption (configurable list
      of types like chore, style, ci, docs, build) and an explicit
      Trace-skip trailer for edge cases.
    tags: [architecture, git, traceability]
    links:
      - type: satisfies
        target: REQ-018
      - type: satisfies
        target: REQ-019
    fields:
      baseline: v0.2.0-dev
      rationale: >
        Type-based exemption handles the 80% case (dependency bumps,
        formatting, CI tweaks) with zero friction. The explicit skip
        trailer handles edge cases where a normally-traced type (like
        feat) genuinely has no artifact mapping, forcing developers to
        consciously acknowledge the gap.
      alternatives: >
        No exemption mechanism (all commits must reference artifacts).
        Rejected because it creates excessive friction for routine
        maintenance commits that have no traceability value.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-014
    type: design-decision
    title: Prefixed IDs over URI-style references
    status: accepted
    description: >
      Cross-repo links use prefix:ID syntax (e.g., rivet:REQ-001) rather than
      full URIs. Simpler to type, more readable in YAML.
    links:
      - type: satisfies
        target: REQ-020
    tags: [cross-repo]
    fields:
      decision: Use prefix:ID syntax with prefix declared in rivet.yaml
      rationale: >
        Simpler and more readable than URIs. Prefix is a local alias
        configured per project, matching sphinx-needs id_prefix pattern.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-015
    type: design-decision
    title: Mesh topology over hub-and-spoke
    status: accepted
    description: >
      Any repo can link to any other repo directly. No central authority required.
    links:
      - type: satisfies
        target: REQ-020
    tags: [cross-repo]
    fields:
      decision: Any repo can link to any other repo directly
      rationale: >
        Avoids central authority requirement. Matches distributed team
        workflows. Transitive resolution handles indirect dependencies.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-016
    type: design-decision
    title: Distributed baselining over centralized manifest
    status: accepted
    description: >
      Repos tag themselves with baseline/* tags; consistency verified not enforced.
    links:
      - type: satisfies
        target: REQ-021
    tags: [cross-repo, baseline]
    fields:
      decision: Repos tag themselves with baseline/* tags; consistency verified not enforced
      rationale: >
        No platform repo required. Each repo joins baselines independently.
        Matches OSLC global configuration model where contributions are optional.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-017
    type: design-decision
    title: Transitive dependency resolution
    status: accepted
    description: >
      Declare direct dependencies only; discover transitive deps automatically.
    links:
      - type: satisfies
        target: REQ-020
    tags: [cross-repo]
    fields:
      decision: Declare direct dependencies only; discover transitively
      rationale: >
        Scales naturally. Avoids redundant declarations. Similar to cargo/npm
        dependency resolution.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-018
    type: design-decision
    title: Schema-embedded conditional rules over external rule engine
    status: draft
    description: >
      Conditional validation rules are expressed directly in schema YAML
      using a when/then syntax, rather than using an external rule engine
      (OPA, Drools) or embedding Lua/WASM scripting.
    tags: [validation, schema]
    links:
      - type: satisfies
        target: REQ-023
    fields:
      rationale: >
        YAML-native rules keep the single-source-of-truth principle — the
        schema file fully describes what is valid. An external rule engine
        adds a deployment dependency and splits validation logic across
        two systems. Eclipse SCORE's metamodel.yaml approach validates this
        direction — their community prefers declarative YAML over code.
      alternatives: >
        OPA/Rego policies or embedded Lua scripting for validation rules.
        Rejected because they add runtime dependencies and split validation
        logic away from the schema that defines the types.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-019
    type: design-decision
    title: Content hashing with graph traversal for impact analysis
    status: draft
    description: >
      Change impact is computed by content-hashing each artifact (title +
      description + fields + links), diffing hashes against a baseline,
      and walking the petgraph link graph from changed nodes to find
      transitively affected artifacts. No separate change-tracking database.
    tags: [traceability, baseline]
    links:
      - type: satisfies
        target: REQ-024
    fields:
      rationale: >
        Combines two existing capabilities (rivet diff + petgraph reachability)
        rather than adding infrastructure. Content hashing is deterministic
        and git-friendly. Eclipse SCORE is waiting on sphinx-needs upstream
        to implement hash-based versioned links — Rivet can implement this
        natively since artifacts are plain data structures.
      alternatives: >
        Git-diff-based detection (parse YAML file diffs). Rejected because
        YAML formatting changes produce false positives and it cannot detect
        semantic changes (e.g., reordered fields that are logically identical).
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-020
    type: design-decision
    title: Configurable type mapping for needs.json import
    status: draft
    description: >
      The needs-json adapter uses a user-defined type-mapping table in
      rivet.yaml to convert sphinx-needs type names to rivet schema types,
      rather than hard-coding a fixed mapping or auto-generating types.
    tags: [interchange, adapter]
    links:
      - type: satisfies
        target: REQ-025
    fields:
      rationale: >
        Every sphinx-needs project defines its own custom types (SCORE has
        50+). A fixed mapping would only work for one project. User-defined
        mapping lets teams control how their specific types map to rivet
        schemas. The same approach works for ID format transformation
        (underscores to dashes, prefix stripping).
      alternatives: >
        Auto-generate rivet schema types from needs.json structure.
        Rejected because it would create throwaway types that don't
        align with any standard schema (aspice, stpa, cybersecurity).
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-021
    type: design-decision
    title: Ephemeral test nodes via source scanning over materialized YAML
    status: draft
    description: >
      Test-to-requirement links are extracted from source code markers and
      test results at analysis time, injected as ephemeral nodes into the
      link graph — the same pattern used for commit traceability (DD-012).
      No test artifact YAML files are generated.
    tags: [testing, traceability]
    links:
      - type: satisfies
        target: REQ-026
    fields:
      rationale: >
        Test code is the source of truth for what tests exist and what they
        verify. Materializing test YAML creates a redundant store that drifts
        from the actual test suite. The ephemeral injection pattern is already
        proven for commit nodes (DD-012) and avoids the maintenance burden
        Eclipse SCORE faces with their manual test specification YAML.
      alternatives: >
        Generate test artifact YAML via a rivet sync-tests command.
        Rejected because it creates thousands of files that must be
        re-synced whenever tests change, duplicating DD-012's lesson.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-022
    type: design-decision
    title: Build-system providers over rivet-specific externals config
    status: draft
    description: >
      Cross-repo dependencies are discovered via pluggable build-system
      providers (Bazel, Nix, custom JSON) rather than a rivet-specific
      externals block. Each provider reads the build system's native
      manifest to extract repo URLs, pinned revisions, and workspace
      paths. Manual overrides are still supported for artifact-path
      hints and repos not in the build graph.
    tags: [cross-repo, bazel, nix]
    links:
      - type: satisfies
        target: REQ-027
      - type: satisfies
        target: REQ-020
    fields:
      rationale: >
        The build system is the source of truth for what depends on what
        at which version. A parallel rivet-specific config drifts and
        adds maintenance burden. Bazel MODULE.bazel, Nix flake.lock,
        and SCORE's known_good.json all contain exactly the information
        rivet needs. Reading them directly means zero-config cross-repo
        validation for projects already using these build systems.
        Source code linking across repos also requires knowing workspace
        paths, which the build system already resolves.
      alternatives: >
        Rivet-only externals config with manual repo/ref declarations.
        Kept as fallback for projects without Bazel or Nix, but not
        the primary path for build-system-managed projects.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-023
    type: design-decision
    title: rowan CST over serde deserialization for build-system parsers
    status: draft
    description: >
      Build-system manifest parsers (MODULE.bazel Starlark subset) use
      rowan for lossless concrete syntax trees rather than serde-based
      deserialization or regex extraction. Hand-written lexer + recursive
      descent parser, same architecture as spar-syntax.
    tags: [parsing, rowan, architecture]
    links:
      - type: satisfies
        target: REQ-028
      - type: satisfies
        target: REQ-027
    fields:
      rationale: >
        rowan provides lossless CST with byte-exact spans for diagnostics,
        error recovery for partial parses, and a proven architecture already
        used in spar and rust-analyzer. Regex fails silently on malformed
        input. serde requires well-formed input and loses positional info.
        The MODULE.bazel Starlark subset is small (~30 syntax kinds) so
        the parser is compact. The same rowan infrastructure will later
        support schema and artifact file parsing for full LSP integration.
      alternatives: >
        Facebook starlark-rust crate (full interpreter, ~50k lines,
        massive overkill). tree-sitter-starlark (adds C dependency,
        grammar may not be maintained). Both rejected in favor of the
        lightweight hand-written approach proven in spar.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-024
    type: design-decision
    title: salsa incremental computation for the validation pipeline
    status: draft
    description: >
      The validation pipeline is restructured as salsa tracked queries:
      parse → store → link_graph → conditional_rules → validate. salsa's
      dependency tracking enables incremental revalidation, free change
      impact analysis, and LSP-ready architecture. Phased adoption alongside
      existing serde_yaml pipeline.
    tags: [validation, salsa, architecture]
    links:
      - type: satisfies
        target: REQ-029
      - type: satisfies
        target: REQ-023
      - type: satisfies
        target: REQ-024
    fields:
      rationale: >
        salsa provides automatic fine-grained dependency tracking between
        computations. When one artifact changes, only affected validation
        rules re-evaluate. This makes conditional rules (REQ-023) efficient
        at scale and change impact analysis (REQ-024) free — impacted
        artifacts are exactly the invalidated salsa queries. The same
        database serves as an LSP backend for IDE integration. spar already
        uses salsa 0.26 successfully for AADL incremental analysis.
      alternatives: >
        Manual invalidation tracking with dirty flags. Rejected because
        it reimplements what salsa does correctly and is error-prone for
        transitive dependencies. The phased approach keeps the existing
        pipeline working during migration.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-028
    type: design-decision
    title: Append-to-file mutation with schema pre-validation
    status: draft
    description: >
      CLI mutation commands (add, modify, remove, link, unlink) load the
      full schema and artifact store, validate the mutation against both,
      then append to or modify the target YAML file. The mutation is
      rejected with a diagnostic if it would violate any schema rule.
      For STPA artifacts, the STPA-specific adapter handles the different
      YAML structure (losses, hazards, ucas, etc.) transparently.
    tags: [cli, mutation, architecture]
    links:
      - type: satisfies
        target: REQ-031
    fields:
      rationale: >
        Schema pre-validation at write time catches errors immediately
        rather than at the next validate run. This makes the CLI the
        authoritative mutation interface — safer than hand-editing YAML
        or delegating to AI agents that may produce structurally valid
        but semantically wrong artifacts. Appending preserves existing
        file structure and comments.
      alternatives: >
        Full file rewrite via serde roundtrip. Rejected because serde
        does not preserve comments, key ordering, or blank lines in
        YAML. A rowan-based YAML CST editor could preserve formatting
        but is a larger investment (future work for the salsa migration).
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-025
    type: design-decision
    title: Kani bounded model checking for panic freedom
    status: draft
    description: >
      Core algorithms (link graph construction, schema merge, artifact
      ref parsing, cycle detection, cardinality validation) are verified
      panic-free via Kani proof harnesses. Kani exhaustively checks all
      inputs within configurable bounds using CBMC.
    tags: [formal-verification, kani]
    links:
      - type: satisfies
        target: REQ-030
    fields:
      rationale: >
        Kani is the lowest-effort highest-value formal verification tool
        for Rust. Proof harnesses are ~10-30 lines each, similar to
        proptest but exhaustive rather than random. Kani is already used
        by AWS for safety-critical Rust (s2n-tls, Firecracker). It
        complements existing proptest (random sampling) and Miri (UB
        detection) with bounded exhaustive checking.
      alternatives: >
        Relying solely on proptest + fuzzing. Rejected because random
        testing cannot prove absence of panics — only Kani's exhaustive
        bounded checking can. Both are kept: proptest for quick CI,
        Kani for proof.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: DD-026
    type: design-decision
    title: Verus inline proofs for validation soundness and completeness
    status: draft
    description: >
      The validation engine's core functions are annotated with Verus
      requires/ensures contracts proving soundness (PASS implies all
      rules satisfied) and completeness (rule violation implies diagnostic
      emitted). Verus uses SMT solving for automated proof discharge.
    tags: [formal-verification, verus]
    links:
      - type: satisfies
        target: REQ-030
    fields:
      rationale: >
        Verus is Rust-native — proofs are inline annotations, not a
        separate language. It understands Rust ownership and lifetimes
        natively. Proving validation soundness and completeness is the
        key property for ISO 26262 TCL 1 tool qualification. No other
        traceability tool has this level of correctness evidence.
      alternatives: >
        Creusot (Why3-based). Similar capability but less Rust-native
        integration. Prusti (Viper-based). Less mature for complex
