  - id: DD-036
    type: design-decision
    title: ASPICE SWE.4/5/6 three-tier test structure
    status: approved
    description: >
      The test suite is organized into three tiers mirroring ASPICE verification
      levels: SWE.4 (unit — proptest, Miri, unit tests per module), SWE.5
      (integration — cross-module tests, STPA/ASPICE roundtrips), and SWE.6
      (qualification — full dogfood validation, benchmark KPI baselines, export
      fidelity). TEST artifact IDs encode their tier via tags.
    tags: [testing, aspice, architecture]
    links:
      - type: satisfies
        target: REQ-014
    fields:
      rationale: >
        Separating unit, integration, and qualification tests maps directly
        onto ASPICE SWE.4/5/6 and provides a clear handoff to certification
        authorities who expect evidence at each tier. Tagging artifacts with
        tier makes the mapping explicit in the traceability matrix.
      alternatives: Flat test structure with no tier distinction. Rejected because it makes ASPICE compliance reporting harder and obscures which tests constitute qualification evidence.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

