  - id: DD-027
    type: design-decision
    title: Rocq metamodel proofs for schema semantics
    status: draft
    description: >
      Schema semantics (traceability rule systems, conditional rules,
      link type algebra) are modeled in Rocq via coq-of-rust translation.
      Properties proven include schema satisfiability, rule consistency,
      monotonicity, and ASPICE V-model completeness. Rocq proofs serve
      as the formal specification against which the Rust implementation
      is validated.
    tags: [formal-verification, rocq, metamodel]
    links:
      - type: satisfies
        target: REQ-030
    fields:
      rationale: >
        Rocq provides the deepest level of assurance — proving that the
        validation rules themselves are mathematically consistent, not
        just that the implementation is correct. Schema satisfiability
        (rules don't contradict) is a property that cannot be proven
        by testing or bounded model checking because it requires
        universal quantification over all possible artifact configurations.
        coq-of-rust translates Rust types to Rocq for specification.
      alternatives: >
        Lean4 via Aeneas translation. Viable alternative with better
        metaprogramming but less Rust tooling maturity. F* via hacspec.
        Good for cryptographic properties but less natural for domain
        modeling.
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

