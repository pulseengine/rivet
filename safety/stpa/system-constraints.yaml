# =============================================================================
# STPA Step 1c — System-Level Constraints
# =============================================================================
#
# System-level constraints specify the conditions that must be enforced to
# prevent hazards.  Each constraint is the logical inversion of a hazard.
#
# Format: <System> & <Condition to Enforce> & <Link to Hazards>
#
# Reference: STPA Handbook, §2.3.3
# =============================================================================

system-constraints:
  - id: SC-1
    title: Rivet must validate all cross-references and report dangling links before any output
    description: >
      Every operation that produces output (reports, metrics, exports) must
      first validate that all artifact links resolve to existing, correctly-
      typed targets.  Dangling or type-mismatched links must be reported as
      errors, not warnings.
    hazards: [H-1]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-2
    title: Rivet must never silently discard artifacts or links during any operation
    description: >
      Every import, export, sync, and merge operation must account for all
      input artifacts.  If an artifact cannot be processed, Rivet must emit
      an explicit diagnostic and either fail the operation or quarantine the
      unprocessable item — never silently drop it.
    hazards: [H-2]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-3
    title: Rivet must compute coverage metrics only from validated, current data
    description: >
      Coverage matrices and statistics must be derived from link data that
      has passed validation in the current session.  Cached or stale
      metrics must be clearly labeled with their validation timestamp.
    hazards: [H-3]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-4
    title: Rivet must verify semantic compatibility when mapping between schemas
    description: >
      Schema mappings (OSLC resource shapes, ReqIF SpecTypes, adapter
      transforms) must be explicitly defined and validated before data
      flows through them.  Unmapped or ambiguously mapped fields must
      cause a hard error, not a silent default.
    hazards: [H-4]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-5
    title: Rivet must detect and surface conflicting modifications before merging
    description: >
      When multiple sources modify the same artifact, Rivet must detect
      the conflict (via timestamps, ETags, or content hashing), present
      it to the user, and require explicit resolution before committing.
    hazards: [H-5]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-6
    title: Rivet must generate compliance reports only from verified traceability data
    description: >
      Report generation must be gated on a successful validation pass.
      If validation has not been run or has failed, report generation
      must either fail or embed a prominent "UNVERIFIED" watermark.
    hazards: [H-6]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-7
    title: Rivet must maintain a complete audit trail for all artifact modifications
    description: >
      Every change to an artifact (create, update, delete, link change)
      must be attributable to a user or system process, timestamped, and
      preserved in the git history.  Sync operations must record the
      remote source and change event identifier.
    hazards: [H-7]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-8
    title: Rivet must isolate sync errors and prevent cross-tool error propagation
    description: >
      Errors or corruptions detected during inbound sync must be
      quarantined.  Rivet must not propagate unvalidated inbound data
      to outbound sync channels or to local authoritative stores
      without explicit user approval.
    hazards: [H-8]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-9
    title: Rivet must preserve rich-text structure during import and export
    description: >
      When importing ReqIF XHTML or OSLC rich-text, Rivet must either
      preserve the structural markup or explicitly warn that content
      has been simplified, so users can verify no semantic information
      was lost.
    hazards: [H-4]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-10
    title: Rivet must validate external artifact existence before accepting links
    description: >
      When creating or updating links to external artifacts (OSLC URIs,
      git commits, file references), Rivet must verify that the target
      exists and is reachable at link-creation time, recording the
      verification timestamp.
    hazards: [H-1, H-3]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-11
    title: Rivet incremental validation must produce identical results to full validation
    description: >
      For any set of inputs, incremental validation (via salsa dependency
      tracking) must produce exactly the same diagnostics as a clean full
      validation pass. If incremental and full results ever diverge, the
      system must detect the divergence and fall back to full validation.
    hazards: [H-9]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-12
    title: Rivet must verify conditional rule consistency before applying rules
    description: >
      When loading schemas with conditional rules, Rivet must check that
      no combination of conditions can produce contradictory requirements
      on a single artifact. Inconsistent rule sets must be rejected at
      schema load time with a diagnostic identifying the conflicting rules.
    hazards: [H-10]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-13
    title: Rivet build-system parsers must reject unrecognized constructs with diagnostics
    description: >
      The MODULE.bazel parser must emit a diagnostic for any Starlark
      construct it does not support (load statements, variable references,
      string concatenation, conditionals). Silently skipping constructs
      is forbidden. The parser must report what it could not parse and
      what dependencies may be missing from the result.
    hazards: [H-11]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-14
    title: Rivet formal proofs must be validated against the implementation under test
    description: >
      Formal verification must prove properties of the actual compiled
      code, not a separate model. Kani harnesses must call the real
      functions. Verus annotations must be on the real implementations.
      Rocq specifications must be generated from or validated against
      the Rust source via coq-of-rust, not hand-written independently.
    hazards: [H-12]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-15
    title: Rivet must HTML-escape all artifact content before rendering in dashboard or document views
    description: >
      Every artifact field value (title, description, custom fields) and
      document body content must be HTML-escaped before insertion into
      HTML output. Script tags, event handlers, and other HTML injection
      vectors must be neutralized. The escaping must occur at the output
      boundary (rendering), not at the input boundary (parsing), to
      ensure defense-in-depth.
    hazards: [H-13]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-16
    title: Rivet must validate WASM adapter outputs against the source data independently
    description: >
      After a WASM adapter returns imported artifacts, the host must
      verify that: (a) the number of returned artifacts is consistent
      with the source data size, (b) all returned artifact IDs conform
      to expected patterns, (c) no artifact IDs were injected that do
      not correspond to source records. Schema validation alone is
      insufficient because a compromised adapter could produce
      schema-conforming but fabricated artifacts.
    hazards: [H-14]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-17
    title: Rivet commit analysis must validate extracted artifact IDs against the known artifact set before counting coverage
    description: >
      The commit traceability engine must not count artifact references
      that do not resolve to known artifacts in the store as coverage.
      The is_artifact_id() heuristic must be supplemented with a
      store.contains() check. Unresolved references must be reported
      as broken refs, not counted as coverage.
    hazards: [H-15]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-18
    title: Rivet dashboard must report reload failures and indicate stale data state
    description: >
      When a dashboard reload fails (due to YAML parse errors, schema
      load failures, or filesystem issues), the server must: (a) return
      an error response to the reload request, (b) display a visible
      "stale data" banner on all dashboard pages until a successful
      reload occurs, (c) log the specific error that caused the reload
      failure.
    hazards: [H-16]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-19
    title: Rivet must not execute git clone/fetch against untrusted URLs without hook protection
    description: >
      The externals sync operation must validate git URLs against an
      allowlist or require explicit user confirmation before cloning
      new repositories. Git clone operations must disable hooks in the
      cloned repository (--config core.hooksPath=/dev/null) to prevent
      arbitrary code execution.
    hazards: [H-17]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-20
    title: Rivet must normalize and validate external paths before use
    description: >
      External repo path resolution must canonicalize paths, handle
      relative vs absolute differences, and fail with a clear diagnostic
      if a path is unreachable rather than silently skipping the external.
      Platform-specific path separators must be normalized.
    hazards: [H-18]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-21
    title: LSP must re-validate within 500ms of file save for stores under 5000 artifacts
    description: >
      When the LSP server receives a textDocument/didSave notification,
      it must invalidate the salsa cache for the changed file and
      re-publish diagnostics within 500 ms for projects containing
      fewer than 5000 artifacts.  Stale cached results must never be
      returned after a save event.
    hazards: [H-19]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-22
    title: VS Code WebView must use sandbox restrictions for dashboard content
    description: >
      The VS Code extension's WebView panel must be created with
      sandbox restrictions that prevent arbitrary script execution
      from non-trusted origins.  The WebView must only accept
      postMessage commands from the extension host and must not
      relay artifact data to untrusted iframe origins.
    hazards: [H-20]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-23
    title: Rivet MCP server must not return stale data after disk changes
    description: >
      The MCP server must detect when artifact files have changed on disk
      since the last tool invocation and reload project state before
      returning results. Alternatively, the server must provide an explicit
      reload mechanism and document that results may be stale.
    hazards: [H-21]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SC-24
    title: Rivet must preserve YAML content byte-for-byte during round-trip operations
    description: >
      Any read-modify-write operation (rivet add, rivet mutate) must
      preserve all existing content, comments, and formatting. Only the
      specific insertion or modification should differ. Verified by the
      rowan round-trip test suite (66 files, 83 edge cases).
    hazards: [H-24]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z
