# =============================================================================
# CLI UCAs — External Sync (STPA-Sec extension)
# =============================================================================
external-sync-ucas:
  control-action: Clone and fetch external git repositories for cross-repo linking
  controller: CTRL-CLI

  not-providing: []

  providing:
    - id: UCA-L-6
      description: >
        CLI sync command executes git clone against an arbitrary URL from
        rivet.yaml without validating the URL or disabling git hooks.
      context: >
        A developer opens a project with a modified rivet.yaml containing
        a malicious git URL. Running `rivet sync` clones the repository,
        which includes a post-checkout hook that executes arbitrary code.
      hazards: [H-17]
      rationale: >
        The rivet.yaml file is the trust boundary for external
        dependencies. A compromised config file enables arbitrary
        code execution on the developer's machine.
      provenance:
        created-by: ai-assisted
        timestamp: 2026-04-07T03:40:26Z

    - id: UCA-L-7
      description: >
        CLI does not validate rivet.lock file integrity before using
        pinned commit SHAs for external sync.
      context: >
        An attacker modifies rivet.lock to point to a different commit
        SHA that contains compromised artifacts. The sync operation
        checks out the attacker-controlled commit.
      hazards: [H-17, H-14]
      rationale: >
        The lock file is meant to ensure reproducible baselines.
        If it can be tampered with undetected, the baseline guarantee
        is void.
      provenance:
        created-by: ai-assisted
        timestamp: 2026-04-07T03:40:26Z

  too-early-too-late: []
  stopped-too-soon: []

# =============================================================================
# Core Engine UCAs — LSP Server (Phase 3 extension)
# =============================================================================
lsp-ucas:
  control-action: Provide incremental validation diagnostics via LSP
  controller: CTRL-CORE

  not-providing:
    - id: UCA-C-26
      description: >
        LSP does not provide updated diagnostics after file save when
        salsa cache is stale.
      context: >
        Developer saves a YAML artifact file in their editor. The LSP
        server receives a textDocument/didSave notification but does not
        invalidate the salsa input query for the changed file. The editor
        continues to display diagnostics from the previous file version.
      hazards: [H-19, H-9]
      rationale: >
        Stale diagnostics in the editor create false confidence that the
        artifact file is valid, hiding newly introduced traceability errors.
      provenance:
        created-by: ai-assisted
        timestamp: 2026-04-07T03:40:26Z

  providing:
    - id: UCA-C-27
      description: >
        Dashboard WebView provides artifact data to untrusted iframe
        origins via postMessage.
      context: >
        The VS Code extension hosts the rivet dashboard in a WebView
        panel. A malicious extension or compromised workspace script
        sends postMessage events to the WebView iframe. The WebView
        message handler does not validate the origin, accepts navigation
        commands, and returns artifact data to the untrusted sender.
      hazards: [H-20]
      rationale: >
        Unrestricted postMessage handling allows data exfiltration of
        sensitive artifacts without requiring filesystem access.
      provenance:
        created-by: ai-assisted
        timestamp: 2026-04-07T03:40:26Z

  too-early-too-late: []
  stopped-too-soon: []

# =============================================================================
# MCP Server UCAs — CA-MCP-1: Return validation results
#                    CA-MCP-2: Return artifact data and coverage metrics
# =============================================================================
mcp-ucas:
  control-action: Return validation results, artifact data, coverage metrics
  controller: CTRL-CLI

  not-providing:
    - id: UCA-M-1
      description: >
        MCP server does not reload project state between tool calls,
        returning stale validation results after files change.
      context: >
        An AI agent modifies an artifact YAML file via a tool call,
        then immediately queries validation status. The MCP server
        returns cached results from before the modification.
      hazards: [H-IMPL-003]
      rationale: >
        Stale validation results cause the agent to believe its changes
        are valid when they may have introduced errors, or to continue
        fixing issues that no longer exist.
      provenance:
        created-by: ai-assisted
        timestamp: 2026-04-07T03:40:26Z

  providing:
    - id: UCA-M-2
      description: >
        MCP server returns partial artifact list when loading fails
        for one source directory, without indicating the failure.
      context: >
        One of the configured source directories contains a YAML file
        with a parse error. The MCP server loads artifacts from other
        directories successfully but silently omits the failing directory.
      hazards: [H-1, H-3]
      rationale: >
        An incomplete artifact list produces incorrect coverage metrics
        and missing link targets. The agent cannot detect the omission
        because no error is reported.
      provenance:
        created-by: ai-assisted
        timestamp: 2026-04-07T03:40:26Z

  too-early-too-late:
    - id: UCA-M-3
      description: >
        MCP server returns coverage metrics before validation completes
        on modified files.
      context: >
        An agent requests coverage immediately after modifying artifacts.
        The MCP server computes coverage from the pre-modification
        validation state because re-validation has not yet run.
      hazards: [H-3, H-IMPL-003]
      rationale: >
        Coverage metrics reflect the old artifact state, misleading the
        agent about the impact of its changes.
      provenance:
        created-by: ai-assisted
        timestamp: 2026-04-07T03:40:26Z

  stopped-too-soon: []
