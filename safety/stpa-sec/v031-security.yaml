# STPA-Sec analysis of v0.3.1 security surface
#
# Covers new attack surfaces introduced by MCP server,
# snapshot files, and embed resolution.

losses:
  - id: SL-IMPL-001
    title: Unauthorized modification of compliance artifacts
    description: >
      An attacker modifies snapshot files or YAML artifacts to
      change validation results, making non-compliant deliverables
      appear compliant.

  - id: SL-IMPL-002
    title: Information disclosure via MCP server
    description: >
      The MCP server exposes artifact data, validation diagnostics,
      and project structure to unauthorized agents.

  - id: SL-IMPL-003
    title: Code injection via embed syntax in documents
    description: >
      Malicious {{embed}} syntax in a document causes unexpected
      behavior during rendering — HTML injection, path traversal,
      or resource exhaustion.

hazards:
  - id: SH-IMPL-001
    title: Snapshot files not integrity-checked
    description: >
      Snapshot JSON files are loaded and trusted without any
      integrity verification. A tampered snapshot could show
      false delta values in the compliance report.
    links:
      - type: leads-to-loss
        target: SL-IMPL-001

  - id: SH-IMPL-002
    title: MCP server has no authentication
    description: >
      The MCP stdio transport has no authentication mechanism.
      Any process that can connect to stdin/stdout can invoke
      rivet tools. On shared systems, this could be exploited.
    links:
      - type: leads-to-loss
        target: SL-IMPL-002

  - id: SH-IMPL-003
    title: Embed resolver processes untrusted input
    description: >
      The EmbedRequest parser processes content from user-authored
      documents. Malformed or adversarial embed syntax could
      trigger unexpected behavior in the resolver.
    links:
      - type: leads-to-loss
        target: SL-IMPL-003

  - id: SH-IMPL-004
    title: YAML deserialization of untrusted snapshot files
    description: >
      Snapshot JSON files are deserialized with serde_json. While
      JSON is safer than YAML (no code execution), a maliciously
      large file could cause memory exhaustion.
    links:
      - type: leads-to-loss
        target: SL-IMPL-001

sec-constraints:
  - id: SSC-IMPL-001
    title: Snapshot files SHOULD include a content hash
    description: >
      Future: add a SHA-256 hash of the snapshot data to enable
      integrity verification. For now, git history provides
      tamper evidence (commits are signed).
    links:
      - type: enforces
        target: SH-IMPL-001

  - id: SSC-IMPL-002
    title: MCP server MUST only bind to localhost stdio
    description: >
      The MCP server uses stdio transport (not HTTP) and does not
      listen on any network port. Access is limited to the local
      process that spawned it. Network transport requires explicit
      opt-in via --transport http.
    links:
      - type: enforces
        target: SH-IMPL-002

  - id: SSC-IMPL-003
    title: Embed parser MUST reject unknown embed names with visible error
    description: >
      Unknown embed names produce an EmbedError with visible HTML
      rendering (SC-EMBED-3). No embed name can trigger file I/O,
      shell execution, or unbounded computation.
    links:
      - type: enforces
        target: SH-IMPL-003

  - id: SSC-IMPL-004
    title: Snapshot deserialization MUST use bounded parsing
    description: >
      serde_json's default parsing is bounded by available memory.
      Snapshot files are project-sized (kilobytes to megabytes),
      not user-uploaded. The risk is low but should be monitored
      if snapshot loading is ever exposed to untrusted input.
    links:
      - type: enforces
        target: SH-IMPL-004

  - id: SSC-IMPL-005
    title: MCP tool results MUST NOT include file system paths outside project
    description: >
      MCP tools return artifact data, diagnostics, and stats scoped
      to the project directory. No absolute paths or file contents
      outside the project root are exposed.
    links:
      - type: enforces
        target: SH-IMPL-002
