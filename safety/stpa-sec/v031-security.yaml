# STPA-Sec analysis of v0.3.1 security surface
#
# Covers new attack surfaces introduced by MCP server,
# snapshot files, and embed resolution.
#
# Converted from STPA-native keys (losses:/hazards:/sec-constraints:)
# to artifacts: format for compatibility with the generic-yaml adapter
# used by the safety/stpa-sec source directory.

artifacts:
  # ── Losses ──────────────────────────────────────────────────────────────

  - id: SL-IMPL-001
    type: sec-loss
    title: Unauthorized modification of compliance artifacts
    status: draft
    description: >
      An attacker modifies snapshot files or YAML artifacts to
      change validation results, making non-compliant deliverables
      appear compliant.
    fields:
      cia-impact: [integrity]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SL-IMPL-002
    type: sec-loss
    title: Information disclosure via MCP server
    status: draft
    description: >
      The MCP server exposes artifact data, validation diagnostics,
      and project structure to unauthorized agents.
    fields:
      cia-impact: [confidentiality]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SL-IMPL-003
    type: sec-loss
    title: Code injection via embed syntax in documents
    status: draft
    description: >
      Malicious {{embed}} syntax in a document causes unexpected
      behavior during rendering — HTML injection, path traversal,
      or resource exhaustion.
    fields:
      cia-impact: [integrity, availability]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  # ── Hazards ─────────────────────────────────────────────────────────────

  - id: SH-IMPL-001
    type: sec-hazard
    title: Snapshot files not integrity-checked
    status: draft
    description: >
      Snapshot JSON files are loaded and trusted without any
      integrity verification. A tampered snapshot could show
      false delta values in the compliance report.
    links:
      - type: leads-to-sec-loss
        target: SL-IMPL-001
    fields:
      cia-impact: [integrity]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SH-IMPL-002
    type: sec-hazard
    title: MCP server has no authentication
    status: draft
    description: >
      The MCP stdio transport has no authentication mechanism.
      Any process that can connect to stdin/stdout can invoke
      rivet tools. On shared systems, this could be exploited.
    links:
      - type: leads-to-sec-loss
        target: SL-IMPL-002
    fields:
      cia-impact: [confidentiality, integrity]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SH-IMPL-003
    type: sec-hazard
    title: Embed resolver processes untrusted input
    status: draft
    description: >
      The EmbedRequest parser processes content from user-authored
      documents. Malformed or adversarial embed syntax could
      trigger unexpected behavior in the resolver.
    links:
      - type: leads-to-sec-loss
        target: SL-IMPL-003
    fields:
      cia-impact: [integrity]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SH-IMPL-004
    type: sec-hazard
    title: YAML deserialization of untrusted snapshot files
    status: draft
    description: >
      Snapshot JSON files are deserialized with serde_json. While
      JSON is safer than YAML (no code execution), a maliciously
      large file could cause memory exhaustion.
    links:
      - type: leads-to-sec-loss
        target: SL-IMPL-001
    fields:
      cia-impact: [availability]
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  # ── Security UCAs ──────────────────────────────────────────────────────

  - id: SUCA-MCP-1
    type: sec-uca
    title: MCP server accepts tool invocations without authentication
    status: draft
    description: >
      The MCP stdio transport accepts tool invocations from any process
      that can pipe to Rivet's stdin. On shared systems, a malicious
      process could query all project artifacts.
    links:
      - type: issued-by
        target: CTRL-CLI
      - type: leads-to-sec-hazard
        target: SH-IMPL-002
    fields:
      uca-type: not-providing
      context: >
        Shared developer machines or CI runners where multiple processes
        have access to stdio.
      adversarial-causation: >
        Insider attacker on a shared CI runner or developer machine spawns
        a process that connects to Rivet's MCP stdin/stdout and invokes
        rivet_list or rivet_validate to exfiltrate project artifacts.
      attacker-type: insider
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SUCA-MCP-2
    type: sec-uca
    title: MCP server returns full file system paths in error messages
    status: draft
    description: >
      Error responses from MCP tools may include absolute file system
      paths, revealing project directory structure to connected agents.
    links:
      - type: issued-by
        target: CTRL-CLI
      - type: leads-to-sec-hazard
        target: SH-IMPL-002
    fields:
      uca-type: providing
      context: >
        AI agent connected via MCP receives detailed error with paths.
      adversarial-causation: >
        External agent connected via MCP triggers an error (e.g., invalid
        artifact ID) and receives an error response containing absolute
        file system paths, disclosing the project directory structure and
        potentially revealing sensitive path components.
      attacker-type: external-network
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  # ── Security Scenarios ─────────────────────────────────────────────────

  - id: SLS-IMPL-001
    type: sec-scenario
    title: Malicious VS Code extension queries artifacts via MCP
    status: draft
    description: >
      A compromised VS Code extension spawns a rivet MCP subprocess
      and calls rivet_list to enumerate all project artifacts including
      security-sensitive design decisions and vulnerability assessments.
    links:
      - type: caused-by-sec-uca
        target: SUCA-MCP-1
      - type: leads-to-sec-hazard
        target: SH-IMPL-002
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  # ── Security Constraints ────────────────────────────────────────────────

  - id: SSC-IMPL-001
    type: sec-constraint
    title: Snapshot files SHOULD include a content hash
    status: draft
    description: >
      Future: add a SHA-256 hash of the snapshot data to enable
      integrity verification. For now, git history provides
      tamper evidence (commits are signed).
    links:
      - type: prevents-sec-hazard
        target: SH-IMPL-001
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SSC-IMPL-002
    type: sec-constraint
    title: MCP server MUST only bind to localhost stdio
    status: draft
    description: >
      The MCP server uses stdio transport (not HTTP) and does not
      listen on any network port. Access is limited to the local
      process that spawned it. Network transport requires explicit
      opt-in via --transport http.
    links:
      - type: prevents-sec-hazard
        target: SH-IMPL-002
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SSC-IMPL-003
    type: sec-constraint
    title: Embed parser MUST reject unknown embed names with visible error
    status: draft
    description: >
      Unknown embed names produce an EmbedError with visible HTML
      rendering (SC-EMBED-3). No embed name can trigger file I/O,
      shell execution, or unbounded computation.
    links:
      - type: prevents-sec-hazard
        target: SH-IMPL-003
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SSC-IMPL-004
    type: sec-constraint
    title: Snapshot deserialization MUST use bounded parsing
    status: draft
    description: >
      serde_json's default parsing is bounded by available memory.
      Snapshot files are project-sized (kilobytes to megabytes),
      not user-uploaded. The risk is low but should be monitored
      if snapshot loading is ever exposed to untrusted input.
    links:
      - type: prevents-sec-hazard
        target: SH-IMPL-004
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SSC-IMPL-005
    type: sec-constraint
    title: MCP tool results MUST NOT include file system paths outside project
    status: draft
    description: >
      MCP tools return artifact data, diagnostics, and stats scoped
      to the project directory. No absolute paths or file contents
      outside the project root are exposed.
    links:
      - type: prevents-sec-hazard
        target: SH-IMPL-002
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z

  - id: SSC-IMPL-006
    type: sec-constraint
    title: MCP tool results MUST NOT include absolute file paths
    status: draft
    description: >
      MCP tool responses must use project-relative paths only.
      Error messages must sanitize paths before returning to the client.
    links:
      - type: prevents-sec-hazard
        target: SH-IMPL-002
    provenance:
      created-by: ai-assisted
      timestamp: 2026-04-07T03:40:26Z
