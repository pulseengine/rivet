name: Release

# Release variant: serialize per-tag, never cancel. A cancelled release
# mid-publish leaves the GitHub Release page, registries, and per-target
# binary archives in inconsistent state.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Cross-platform binary builds ──────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p rivet-cli

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p rivet-cli

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: strip "target/${{ matrix.target }}/release/rivet" 2>/dev/null || true

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="rivet-${VERSION}-${TARGET}.tar.gz"
          mkdir -p staging
          cp "target/${TARGET}/release/rivet" staging/
          tar -czf "$ARCHIVE" -C staging .
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          ARCHIVE="rivet-${VERSION}-${TARGET}.zip"
          mkdir -p staging
          cp "target/${TARGET}/release/rivet.exe" staging/
          cd staging && 7z a "../$ARCHIVE" . && cd ..
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  # ── Docs-vs-reality gate (release-time rerun of the CI check) ─────────
  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --release -p rivet-cli -- docs check

  # ── Baseline snapshot ─────────────────────────────────────────────────
  capture-snapshot:
    name: Capture baseline snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Capture snapshot
        env:
          TAG: ${{ github.ref_name }}
        run: cargo run --release -- snapshot capture --name "$TAG"

      - uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: snapshots/

      - name: Commit snapshot to main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git diff --cached --quiet && exit 0
          git commit -m "chore: capture baseline snapshot for $TAG"
          git push origin HEAD:main || true

  # ── Compliance report (HTML export) ───────────────────────────────────
  # Uses snapshots already committed from PREVIOUS releases (not the one
  # just captured). The new snapshot is for future release comparisons.
  build-compliance:
    name: Build compliance report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Generate compliance report
        id: report
        uses: ./.github/actions/compliance
        with:
          theme: dark

      - uses: actions/upload-artifact@v4
        with:
          name: compliance-report
          path: ${{ steps.report.outputs.archive-path }}

  # ── Test evidence bundle ──────────────────────────────────────────────
  build-test-evidence:
    name: Build test evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-llvm-cov

      - name: Build spar WASM assets
        run: |
          git clone --depth 1 https://github.com/pulseengine/spar.git ../spar
          npm install -g @bytecodealliance/jco
          ./scripts/build-wasm.sh ../spar

      - name: Run tests with JUnit XML
        run: |
          mkdir -p test-evidence/test-results
          cargo nextest run --all --profile ci
          cp target/nextest/ci/junit.xml test-evidence/test-results/junit.xml

      - name: Generate coverage
        run: |
          mkdir -p test-evidence/coverage
          cargo llvm-cov --all-features --workspace --lcov --output-path test-evidence/coverage/lcov.info
          cargo llvm-cov report > test-evidence/coverage/summary.txt

      - name: Run benchmarks
        run: |
          cargo bench --bench core_benchmarks -- --output-format=criterion
          mkdir -p test-evidence/benchmarks
          cp -r target/criterion/* test-evidence/benchmarks/ 2>/dev/null || true

      - name: Run rivet validate
        run: |
          mkdir -p test-evidence/validation
          set +e
          cargo run --release -- validate > test-evidence/validation/validate-output.txt 2>&1
          rc=$?
          set -e
          echo "exit_code=${rc}" >> test-evidence/validation/validate-output.txt

      - name: Generate metadata
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          jq -n \
            --arg tag "${TAG}" \
            --arg commit "${GITHUB_SHA}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg rust_version "$(rustc --version)" \
            --arg os "$(uname -srm)" \
            '{tag: $tag, commit: $commit, timestamp: $timestamp, rust_version: $rust_version, os: $os}' \
            > test-evidence/metadata.json

      - name: Package
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          tar czf "rivet-${VERSION}-test-evidence.tar.gz" test-evidence/

      - uses: actions/upload-artifact@v4
        with:
          name: test-evidence
          path: rivet-*-test-evidence.tar.gz

  # ── VS Code Extension VSIX ────────────────────────────────────────────
  # Builds the VSIX so it can be attached to the GitHub Release and
  # separately published to the VS Code Marketplace.
  build-vsix:
    name: Build VS Code Extension VSIX
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install extension dependencies
        working-directory: vscode-rivet
        run: npm ci
      - name: Compile extension
        working-directory: vscode-rivet
        run: npm run compile
      - name: Package VSIX
        working-directory: vscode-rivet
        run: npx @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-rivet/*.vsix

  # ── Create GitHub Release ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-binaries, build-compliance, build-test-evidence, build-vsix, docs-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.vsix" \) -exec mv {} release/ \;
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # Idempotent: if a release already exists for this tag (e.g.
          # the maintainer ran `gh release create` manually after pushing
          # the tag), upload assets to the existing release. Otherwise
          # create the release with assets. `--clobber` lets re-runs
          # overwrite assets that a previous failed attempt partially
          # uploaded.
          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "::notice::Release $VERSION already exists; uploading assets"
            gh release upload "$VERSION" --clobber release/*
          else
            echo "::notice::Creating Release $VERSION with assets"
            gh release create "$VERSION" \
              --title "Rivet $VERSION" \
              --generate-notes \
              release/*
          fi

  # ── Publish VS Code Extension to Marketplace ──────────────────────────
  # Runs after create-release so the VSIX is always on the Release page
  # even if Marketplace publish fails or VSCE_PAT isn't set. The
  # conditional guard prints a visible warning rather than silently
  # skipping, which is how the previous ci.yml flow made "rivet extension
  # never reaches Marketplace" invisible.
  publish-vsix-marketplace:
    name: Publish VSIX to VS Code Marketplace
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsix
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::warning::VSCE_PAT secret is not configured. VSIX is attached to the GitHub Release but WILL NOT be published to the Marketplace."
            echo "::warning::See https://code.visualstudio.com/api/working-with-extensions/publishing-extension for PAT setup."
            exit 0
          fi
          npx @vscode/vsce publish --packagePath vsix/*.vsix
