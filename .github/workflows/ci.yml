name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Fast checks ───────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yamllint
      - run: yamllint -c .yamllint.yaml schemas/ artifacts/ rivet.yaml .github/

  # ── Tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (JUnit XML output)
        run: |
          cargo install cargo-nextest --locked 2>/dev/null || true
          if command -v cargo-nextest &>/dev/null; then
            cargo nextest run --all --profile ci
          else
            cargo test --all
          fi
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  # ── Playwright E2E ────────────────────────────────────────────────────
  playwright:
    name: Playwright E2E
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: tests/playwright
        run: npx playwright test
        env:
          CI: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/test-results/
          if-no-files-found: ignore

  # ── VS Code Extension ────────────────────────────────────────────────
  vscode-extension:
    name: VS Code Extension
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build rivet binary
        run: cargo build --release
      - name: Add rivet to PATH
        run: echo "$PWD/target/release" >> $GITHUB_PATH
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install extension dependencies
        working-directory: vscode-rivet
        run: npm ci
      - name: Compile extension
        working-directory: vscode-rivet
        run: npm run compile
      - name: Run extension tests (headless VS Code)
        working-directory: vscode-rivet
        run: xvfb-run -a npm test
        env:
          DISPLAY: ':99.0'

  # ── Build VS Code VSIX (release tags only) ───────────────────────────
  build-vsix:
    name: Build VS Code Extension VSIX
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install extension dependencies
        working-directory: vscode-rivet
        run: npm ci
      - name: Compile extension
        working-directory: vscode-rivet
        run: npm run compile
      - name: Package VSIX
        working-directory: vscode-rivet
        run: npx @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-rivet/*.vsix

  # ── Publish VS Code Extension to Marketplace (release tags only) ─────
  publish-vsix:
    name: Publish to VS Code Marketplace
    needs: [build-vsix, release-results]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsix
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Publish to Marketplace
        # Requires VSCE_PAT secret in GitHub repo settings.
        # See: https://code.visualstudio.com/api/working-with-extensions/publishing-extension
        run: |
          if [ -n "$VSCE_PAT" ]; then
            npx @vscode/vsce publish --packagePath vsix/*.vsix
          else
            echo "VSCE_PAT not set, skipping marketplace publish"
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  # ── Security audits ──────────────────────────────────────────────────
  audit:
    name: Security Audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # wasmtime 42.0.1 advisories ignored — behind optional wasm feature gate.
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0085
          --ignore RUSTSEC-2026-0086
          --ignore RUSTSEC-2026-0087
          --ignore RUSTSEC-2026-0088
          --ignore RUSTSEC-2026-0089
          --ignore RUSTSEC-2026-0091
          --ignore RUSTSEC-2026-0092
          --ignore RUSTSEC-2026-0093
          --ignore RUSTSEC-2026-0094
          --ignore RUSTSEC-2026-0095
          --ignore RUSTSEC-2026-0096

  deny:
    name: Cargo Deny (licenses, bans, sources, advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny
        run: cargo deny check

  # ── Code coverage (Rust nightly for source-based instrumentation) ───
  coverage:
    name: Code Coverage
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (LCOV + HTML)
        run: |
          cargo llvm-cov -p rivet-core --lcov --output-path lcov.info
          cargo llvm-cov -p rivet-core --html --output-dir coverage-html
      - name: Enforce minimum coverage threshold
        run: cargo llvm-cov -p rivet-core --fail-under-lines 40
      - name: Upload LCOV to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/

  # ── Miri (undefined behavior, pointer provenance) ───────────────────
  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri
        # Run safety-critical modules under Miri with tree borrows model.
        # Uses pulseengine/rowan fork with Miri UB fixes (upstream: rust-analyzer/rowan#210).
        # Skip: bazel/db (salsa internals), externals (spawns git),
        # export/providers/test_scanner/yaml_edit (not safety-critical, slow under Miri).
        # Skip yaml_cst/yaml_hir tests that create multi-item trees: rowan cursor
        # deallocation UB with large trees under tree borrows (pulseengine/rowan#211).
        # Single-item parser tests (25/26) pass clean.
        # Also skip feature_model (constraint parsing builds rowan trees → same UB).
        run: cargo miri test -p rivet-core --lib -- --skip bazel --skip db --skip externals --skip export --skip providers --skip test_scanner --skip yaml_edit --skip markdown --skip parse_actual_hazards --skip stpa_hazard --skip yaml_hir --skip feature_model
        timeout-minutes: 10
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-tree-borrows"

  # ── Property-based testing (extended) ───────────────────────────────
  proptest:
    name: Proptest (extended)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run proptest with 10x cases
        run: cargo test --all
        env:
          PROPTEST_CASES: "1000"

  # ── Mutation testing (hard gate — zero surviving mutants) ────────────
  mutants:
    name: Mutation Testing
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Run cargo-mutants on rivet-core
        run: cargo mutants -p rivet-core --timeout 120 --jobs 4 --output mutants-out -- --lib || true
      - name: Run cargo-mutants on rivet-cli
        run: cargo mutants -p rivet-cli --timeout 120 --jobs 4 --output mutants-cli-out -- --lib || true
      - name: Check surviving mutants
        run: |
          MISSED=0
          for dir in mutants-out mutants-cli-out; do
            if [ -f "$dir/missed.txt" ]; then
              COUNT=$(wc -l < "$dir/missed.txt" | tr -d ' ')
              MISSED=$((MISSED + COUNT))
            fi
          done
          echo "Surviving mutants: $MISSED"
          if [ "$MISSED" -gt 0 ]; then
            echo "::error::$MISSED mutant(s) survived — add tests to kill them"
            for dir in mutants-out mutants-cli-out; do
              if [ -f "$dir/missed.txt" ]; then
                echo "--- $dir ---"
                head -30 "$dir/missed.txt"
              fi
            done
            exit 1
          fi
      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: |
            mutants-out/
            mutants-cli-out/

  # ── Fuzz testing (main only — too slow for PRs) ───────────────────
  fuzz:
    name: Fuzz Testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Run fuzz targets (30s each)
        run: |
          if [ ! -d fuzz ]; then
            echo "::notice::No fuzz directory found — skipping"
            exit 0
          fi
          cd fuzz
          TARGETS=$(cargo +nightly fuzz list 2>/dev/null || true)
          if [ -z "$TARGETS" ]; then
            echo "::notice::No fuzz targets defined — skipping"
            exit 0
          fi
          for target in $TARGETS; do
            echo "::group::Fuzzing $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=30 || true
            echo "::endgroup::"
          done

  # ── Supply chain verification ───────────────────────────────────────
  supply-chain:
    name: Supply Chain (cargo-vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-vet
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-vet
      - name: Initialize cargo-vet if needed
        run: |
          if [ ! -d supply-chain ]; then
            cargo vet init
            echo "::notice::cargo-vet initialized — run 'cargo vet' locally to audit dependencies"
          fi
      - name: Check supply chain
        run: cargo vet --locked

  # ── Kani bounded model checking ────────────────────────────────────
  kani:
    name: Kani Proofs
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: model-checking/kani-github-action@v1
      - run: cargo kani -p rivet-core

  # ── Verus SMT verification ──────────────────────────────────────────
  verus:
    name: Verus Proofs
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Verify Verus specs
        working-directory: verus
        run: bazel test //:rivet_specs_verify

  # ── Rocq metamodel proofs ─────────────────────────────────────────
  rocq:
    name: Rocq Proofs
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Verify Rocq proofs
        working-directory: proofs/rocq
        run: bazel test //:rivet_metamodel_test

  # ── MSRV check ──────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all

  # ── Attach test results + attestation to releases ───────────────────
  release-results:
    name: Publish Test Results on Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, miri, proptest, playwright, build-vsix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Build release binary
        run: cargo build --release
      - name: Run tests with JUnit output
        run: cargo nextest run --all --profile ci
      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/release/rivet
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: vsix
      - name: Package results
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p release-results
          cp target/nextest/ci/junit.xml release-results/test-results-${VERSION}.xml 2>/dev/null || true
          cp lcov.info release-results/coverage-${VERSION}.lcov
          cp target/release/rivet release-results/rivet-linux-x86_64
          TSTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n --arg v "$VERSION" --arg c "$GITHUB_SHA" --arg t "$TSTAMP" \
            '{version: $v, commit: $c, timestamp: $t}' \
            > release-results/metadata.json
          tar czf release-results-${VERSION}.tar.gz release-results/
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-results-*.tar.gz
            target/release/rivet
            vsix/*.vsix
