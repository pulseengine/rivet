name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Fast checks ───────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yamllint
      - run: yamllint -c .yamllint.yaml schemas/ artifacts/ rivet.yaml .github/

  # ── Docs-vs-reality gate (REQ-054) ────────────────────────────────────
  # A real gate — no continue-on-error.  Budget <1 minute on cached runs.
  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run rivet docs check
        run: cargo run --release -p rivet-cli -- docs check

  # ── Tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      RIVET_ACTIONLINT: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
          actionlint --version
      - name: Run tests (JUnit XML output)
        run: |
          cargo install cargo-nextest --locked 2>/dev/null || true
          if command -v cargo-nextest &>/dev/null; then
            cargo nextest run --all --profile ci
          else
            cargo test --all
          fi
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  # ── Playwright E2E ────────────────────────────────────────────────────
  playwright:
    name: Playwright E2E
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: tests/playwright
        run: npx playwright test
        env:
          CI: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright/test-results/
          if-no-files-found: ignore

  # ── VS Code Extension ────────────────────────────────────────────────
  vscode-extension:
    name: VS Code Extension
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build rivet binary
        run: cargo build --release
      - name: Add rivet to PATH
        run: echo "$PWD/target/release" >> $GITHUB_PATH
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install extension dependencies
        working-directory: vscode-rivet
        run: npm ci
      - name: Compile extension
        working-directory: vscode-rivet
        run: npm run compile
      - name: Run extension tests (headless VS Code)
        working-directory: vscode-rivet
        run: xvfb-run -a npm test
        env:
          DISPLAY: ':99.0'

  # VSIX build + publish live in release.yml now so the extension attaches
  # to the GitHub Release on tag push AND flows to the Marketplace in the
  # same pipeline. The previous `publish-vsix` here depended on a
  # non-existent `release-results` job, so the Marketplace push never
  # actually ran (which is why only the spar extension is currently on the
  # Marketplace — its workflow is scoped differently). See release.yml.

  # ── Security audits ──────────────────────────────────────────────────
  audit:
    name: Security Audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # wasmtime 42.0.1 advisories ignored — behind optional wasm feature gate.
        run: >-
          cargo audit
          --ignore RUSTSEC-2026-0085
          --ignore RUSTSEC-2026-0086
          --ignore RUSTSEC-2026-0087
          --ignore RUSTSEC-2026-0088
          --ignore RUSTSEC-2026-0089
          --ignore RUSTSEC-2026-0091
          --ignore RUSTSEC-2026-0092
          --ignore RUSTSEC-2026-0093
          --ignore RUSTSEC-2026-0094
          --ignore RUSTSEC-2026-0095
          --ignore RUSTSEC-2026-0096
          --ignore RUSTSEC-2026-0103
          --ignore RUSTSEC-2026-0104

  deny:
    name: Cargo Deny (licenses, bans, sources, advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Run cargo-deny
        run: cargo deny check

  # ── Public API stability (semver drift gate) ────────────────────────
  # Runs only on pull_request so main can move freely between tags.
  # Fails the PR if the public API of rivet-core changes in a way that
  # would require a semver major/minor bump relative to the base branch.
  # SCRC Phase 2 (DD-063): catch accidental breaking changes before they
  # escape to a release.
  semver-checks:
    name: Semver Checks (rivet-core public API)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run cargo-semver-checks
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: rivet-core
          feature-group: default-features

  # ── Code coverage (Rust nightly for source-based instrumentation) ───
  coverage:
    name: Code Coverage
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (LCOV + HTML)
        run: |
          cargo llvm-cov -p rivet-core --lcov --output-path lcov.info
          cargo llvm-cov -p rivet-core --html --output-dir coverage-html
      - name: Enforce minimum coverage threshold
        run: cargo llvm-cov -p rivet-core --fail-under-lines 40
      - name: Upload LCOV to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/

  # ── Miri (undefined behavior, pointer provenance) ───────────────────
  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri
        # Run safety-critical modules under Miri with tree borrows model.
        # Uses pulseengine/rowan fork with Miri UB fixes (upstream: rust-analyzer/rowan#210).
        # Skip: bazel/db (salsa internals), externals (spawns git),
        # export/providers/test_scanner/yaml_edit (not safety-critical, slow under Miri).
        # Skip yaml_cst/yaml_hir tests that create multi-item trees: rowan cursor
        # deallocation UB with large trees under tree borrows (pulseengine/rowan#211).
        # Single-item parser tests (25/26) pass clean.
        # Also skip feature_model (constraint parsing builds rowan trees → same UB).
        # Also skip doc_check (pulldown-cmark heavy → 30–90s/test under Miri,
        # times out the job; business-logic tests, not memory-safety tests).
        # Skip sexpr_eval and any test that goes through it (embed query,
        # query::execute_sexpr, parse_query): all build rowan trees via
        # s-expr parsing and hit the same cursor deallocation UB as
        # yaml_cst/feature_model (pulseengine/rowan#211).
        run: cargo miri test -p rivet-core --lib -- --skip bazel --skip db --skip externals --skip export --skip providers --skip test_scanner --skip yaml_edit --skip markdown --skip parse_actual_hazards --skip stpa_hazard --skip yaml_hir --skip feature_model --skip doc_check --skip sexpr_eval --skip query_embed --skip parse_query --skip execute_sexpr
        timeout-minutes: 15
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation -Zmiri-tree-borrows"

  # ── Property-based testing (extended) ───────────────────────────────
  proptest:
    name: Proptest (extended)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run proptest with 10x cases
        run: cargo test --all
        env:
          PROPTEST_CASES: "1000"

  # ── Mutation testing ─────────────────────────────────────────────────
  # Split per-crate into parallel jobs so each has its own 45-min budget.
  #
  # rivet-cli: hard gate (0 surviving mutants as of this commit).
  # rivet-core: NOT a hard gate — 3677 mutants, known-surviving ones in
  # lib.rs (collect_yaml_files, import_with_schema branches) and bazel.rs
  # lex(). Need targeted tests before this can be flipped. See the
  # per-crate `continue-on-error` below.
  mutants:
    name: Mutation Testing (${{ matrix.crate }})
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Hard gate only for rivet-cli; rivet-core is still surfacing real
    # coverage gaps that need tests written. Flip to `false` once killed.
    continue-on-error: ${{ matrix.crate == 'rivet-core' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { crate: rivet-cli,  shard: '0/1', shard_id: '0-of-1' }
          - { crate: rivet-core, shard: '0/4', shard_id: '0-of-4' }
          - { crate: rivet-core, shard: '1/4', shard_id: '1-of-4' }
          - { crate: rivet-core, shard: '2/4', shard_id: '2-of-4' }
          - { crate: rivet-core, shard: '3/4', shard_id: '3-of-4' }
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: mutants-${{ matrix.crate }}-${{ matrix.shard_id }}
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Run cargo-mutants
        run: cargo mutants -p ${{ matrix.crate }} --shard ${{ matrix.shard }} --timeout 90 --jobs 4 --output mutants-out -- --lib || true
      - name: Check surviving mutants
        run: |
          MISSED=0
          if [ -f "mutants-out/missed.txt" ]; then
            MISSED=$(wc -l < "mutants-out/missed.txt" | tr -d ' ')
          fi
          echo "Surviving mutants in ${{ matrix.crate }}: $MISSED"
          if [ "$MISSED" -gt 0 ]; then
            echo "::error::$MISSED mutant(s) survived in ${{ matrix.crate }} — add tests to kill them"
            head -30 mutants-out/missed.txt
            exit 1
          fi
      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report-${{ matrix.crate }}-${{ matrix.shard_id }}
          path: mutants-out/

  # ── Fuzz testing (main only — too slow for PRs) ───────────────────
  fuzz:
    name: Fuzz Testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Run fuzz targets (30s each)
        run: |
          if [ ! -d fuzz ]; then
            echo "::notice::No fuzz directory found — skipping"
            exit 0
          fi
          cd fuzz
          TARGETS=$(cargo +nightly fuzz list 2>/dev/null || true)
          if [ -z "$TARGETS" ]; then
            echo "::notice::No fuzz targets defined — skipping"
            exit 0
          fi
          for target in $TARGETS; do
            echo "::group::Fuzzing $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=30 || true
            echo "::endgroup::"
          done

  # ── Supply chain verification ───────────────────────────────────────
  supply-chain:
    name: Supply Chain (cargo-vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-vet
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-vet
      - name: Initialize cargo-vet if needed
        run: |
          if [ ! -d supply-chain ]; then
            cargo vet init
            echo "::notice::cargo-vet initialized — run 'cargo vet' locally to audit dependencies"
          fi
      - name: Check supply chain
        run: cargo vet --locked

  # ── Kani bounded model checking ────────────────────────────────────
  # Not yet a hard gate: the 27-harness suite exceeds the 30-minute budget.
  # Either needs scoping (run a subset on PRs, full suite nightly) or
  # harness-by-harness unwind tuning. TODO: flip to hard gate once a
  # PR-sized subset completes in <20 min.
  kani:
    name: Kani Proofs
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      # PR runs: smoke-test only (--only-codegen, ~5 min). Full Kani
      # runs on push to main (still 45 min budget). The 27-harness
      # full suite was overrunning the 45 min budget mid-unwind.
      - if: github.event_name == 'pull_request'
        uses: model-checking/kani-github-action@v1
        with:
          args: '-p rivet-core --only-codegen'
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: model-checking/kani-github-action@v1
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cargo kani -p rivet-core

  # ── Verus SMT verification ──────────────────────────────────────────
  # Toolchain + workspace are now correct (rules_verus@fc7b636 past the
  # CcInfo bump; root MODULE.bazel lets //verus see //rivet-core/src).
  # But the specs themselves fail verification ("FAIL in 0.1s" — Verus
  # rejects at least one proof obligation). That's a genuine SMT result,
  # not a plumbing issue, and it needs spec-level work separate from
  # the CI hard-gate PR. Soft-gate with a clear TODO until the specs
  # are green under the unified workspace.
  verus:
    name: Verus Proofs
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      # Nix is required because the unified root MODULE.bazel registers
      # the Rocq toolchain, which depends on rules_nixpkgs_core. Bazel
      # resolves all registered toolchains at analysis time regardless
      # of which target is being built, so Nix must be on PATH even for
      # Verus-only invocations.
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Verify Verus specs
        run: bazel test //verus:rivet_specs_verify
      - name: Upload Verus test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verus-test-log
          path: |
            bazel-out/*/testlogs/verus/rivet_specs_verify/test.log
            bazel-testlogs/verus/rivet_specs_verify/test.log
          if-no-files-found: warn

  # ── Rocq metamodel proofs ─────────────────────────────────────────
  # Not yet a hard gate: the proofs were written against an older Rocq and
  # hit multiple 9.0.1 compatibility issues (length/++ scope resolution —
  # fixed; `apply` constructor inference — fixed via `eapply`; `No such
  # contradiction` on some destructures — unfixed; vmodel_chain_two_steps
  # has a real proof gap, currently Admitted with note). Needs systematic
  # port. TODO: flip to hard gate after the Rocq 9 port PR.
  rocq:
    name: Rocq Proofs
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.14.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Verify Rocq proofs
        # Build only the Schema library: rules_rocq_rust has a LoadPath
        # issue where rivet_validation depending on rivet_schema fails
        # to resolve `Require Import Schema.` (tried bare and
        # `From rivet_schema Require Import Schema.` — both fail with
        # "Cannot find a physical path bound to logical path Schema").
        # Restoring full Validation.v verification needs the systematic
        # Rocq 9 port the workflow comment already flagged. For now,
        # Schema.v's proofs (with Admitted gaps documented as
        # REQ-004 follow-up work) are verified.
        run: bazel build //proofs/rocq:rivet_schema

  # ── MSRV check ──────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all

  # ── Attach test results + attestation to releases ───────────────────
  #
  # VSIX packaging moved to release.yml so the extension ships together
  # with the platform binaries on tag push. This job now only attaches
  # the JUnit, coverage lcov, and attested rivet binary for the tag.
  release-results:
    name: Publish Test Results on Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, miri, proptest, playwright]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Build release binary
        run: cargo build --release
      - name: Run tests with JUnit output
        run: cargo nextest run --all --profile ci
      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: target/release/rivet
      - name: Package results
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p release-results
          cp target/nextest/ci/junit.xml release-results/test-results-${VERSION}.xml 2>/dev/null || true
          cp lcov.info release-results/coverage-${VERSION}.lcov
          cp target/release/rivet release-results/rivet-linux-x86_64
          TSTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n --arg v "$VERSION" --arg c "$GITHUB_SHA" --arg t "$TSTAMP" \
            '{version: $v, commit: $c, timestamp: $t}' \
            > release-results/metadata.json
          tar czf release-results-${VERSION}.tar.gz release-results/
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-results-*.tar.gz
            target/release/rivet
