name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Fast checks ───────────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yamllint
      - run: yamllint -c .yamllint.yaml schemas/ artifacts/ rivet.yaml .github/

  # ── Tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (JUnit XML output)
        run: |
          cargo install cargo-nextest --locked 2>/dev/null || true
          if command -v cargo-nextest &>/dev/null; then
            cargo nextest run --all --profile ci
          else
            cargo test --all
          fi
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/nextest/ci/junit.xml
          if-no-files-found: ignore

  # ── Security audits ──────────────────────────────────────────────────
  audit:
    name: Security Audit (RustSec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: Cargo Deny (licenses, bans, sources, advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── Code coverage (Rust nightly for source-based instrumentation) ───
  coverage:
    name: Code Coverage
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (LCOV + HTML)
        run: |
          cargo llvm-cov -p rivet-core --lcov --output-path lcov.info
          cargo llvm-cov -p rivet-core --html --output-dir coverage-html
      - name: Enforce minimum coverage threshold
        run: cargo llvm-cov -p rivet-core --fail-under-lines 40
      - name: Upload LCOV to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/

  # ── Miri (undefined behavior, pointer provenance) ───────────────────
  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri
        run: cargo miri test -p rivet-core --lib
        env:
          MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-disable-isolation"

  # ── Property-based testing (extended) ───────────────────────────────
  proptest:
    name: Proptest (extended)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run proptest with 10x cases
        run: cargo test --all
        env:
          PROPTEST_CASES: "1000"

  # ── Mutation testing ────────────────────────────────────────────────
  mutants:
    name: Mutation Testing
    needs: [test]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - name: Run cargo-mutants on rivet-core
        run: cargo mutants -p rivet-core --lib --timeout 120 --jobs 4 --output mutants-out
      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants-out/

  # ── Fuzz testing (main only — too slow for PRs) ───────────────────
  fuzz:
    name: Fuzz Testing
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz
      - name: Run fuzz targets (30s each)
        run: |
          if [ ! -d fuzz ]; then
            echo "::notice::No fuzz directory found — skipping"
            exit 0
          fi
          cd fuzz
          TARGETS=$(cargo +nightly fuzz list 2>/dev/null || true)
          if [ -z "$TARGETS" ]; then
            echo "::notice::No fuzz targets defined — skipping"
            exit 0
          fi
          for target in $TARGETS; do
            echo "::group::Fuzzing $target"
            cargo +nightly fuzz run "$target" -- -max_total_time=30 || true
            echo "::endgroup::"
          done

  # ── Supply chain verification ───────────────────────────────────────
  supply-chain:
    name: Supply Chain (cargo-vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-vet
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-vet
      - name: Initialize cargo-vet if needed
        run: |
          if [ ! -d supply-chain ]; then
            cargo vet init
            echo "::notice::cargo-vet initialized — run 'cargo vet' locally to audit dependencies"
          fi
      - name: Check supply chain
        run: cargo vet --locked || echo "::warning::cargo-vet found unaudited crates — run 'cargo vet' locally"

  # ── MSRV check ──────────────────────────────────────────────────────
  msrv:
    name: MSRV (1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all

  # ── Attach test results to releases ─────────────────────────────────
  release-results:
    name: Publish Test Results on Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, coverage, miri, proptest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Run tests with JUnit output
        run: cargo nextest run --all --profile ci
      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Package results
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p release-results
          cp target/nextest/ci/junit.xml release-results/test-results-${VERSION}.xml 2>/dev/null || true
          cp lcov.info release-results/coverage-${VERSION}.lcov
          TSTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          jq -n --arg v "$VERSION" --arg c "$GITHUB_SHA" --arg t "$TSTAMP" \
            '{version: $v, commit: $c, timestamp: $t}' \
            > release-results/metadata.json
          tar czf release-results-${VERSION}.tar.gz release-results/
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: release-results-*.tar.gz
