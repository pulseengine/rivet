name: Release NPM

# Runs after the main Release workflow (release.yml) publishes a GitHub
# Release with the per-target binary archives. Downloads those archives,
# assembles one npm platform package per target, publishes them, and finally
# publishes the root @pulseengine/rivet package that depends on them via
# optionalDependencies.
#
# Platform packages MUST be published before the root package so npm can
# resolve optionalDependencies on the first install after tag.
#
# Trigger: workflow_run on the Release workflow, NOT release: published.
# Reason: Release creates the GitHub Release page using the default
# GITHUB_TOKEN, and GitHub deliberately suppresses downstream workflow
# triggers from runs that authenticated with GITHUB_TOKEN (loop-prevention
# guarantee). workflow_run is the documented escape hatch for chaining
# workflows in this case. Note: workflow_run only fires when this file is
# present on the default branch.

# Release variant: serialize per-release, never cancel. A cancelled npm
# publish run can leave platform packages published but root package
# missing — first-install resolution would fail until manual cleanup.
concurrency:
  group: release-npm-${{ github.event.workflow_run.head_branch || github.event.inputs.version || github.ref }}
  cancel-in-progress: false

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish (e.g. v0.4.0)"
        required: true

permissions:
  contents: read

jobs:
  publish-platform-packages:
    name: Publish platform package (${{ matrix.platform }})
    # Skip on failed/cancelled upstream Release runs. Always run for
    # manual workflow_dispatch (used for backfills).
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            platform: darwin-arm64
            binary: rivet
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            platform: darwin-x64
            binary: rivet
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            binary: rivet
            archive_ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary: rivet
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            platform: win32-x64
            binary: rivet.exe
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        id: version
        env:
          # workflow_run: head_branch is the tag name (e.g. v0.8.0) when
          # the upstream Release workflow ran on a tag push.
          # workflow_dispatch: the user-supplied tag input (used for
          # backfills of releases whose initial workflow_run never fired).
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_TAG: ${{ github.event.inputs.version }}
        run: |
          TAG="${INPUT_TAG:-$RUN_BRANCH}"
          if [ -z "$TAG" ]; then
            echo "No tag provided" >&2
            exit 1
          fi
          # Guard: only publish for release tags. Release.yml is currently
          # only triggered by tag push, but this guard makes the workflow
          # safe against accidental manual runs of Release on a branch ref.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Tag '$TAG' is not a release tag (expected vX.Y.Z); skipping" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
          BINARY: ${{ matrix.binary }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          ASSET="rivet-${TAG}-${TARGET}.${ARCHIVE_EXT}"
          mkdir -p staging
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$ASSET" --dir staging
          ls -la staging
          if [ "$ARCHIVE_EXT" = "zip" ]; then
            unzip -q "staging/$ASSET" -d staging
          else
            tar -xzf "staging/$ASSET" -C staging
          fi
          cp "staging/$BINARY" "platform-packages/$PLATFORM/$BINARY"
          if [ "$ARCHIVE_EXT" != "zip" ]; then
            chmod +x "platform-packages/$PLATFORM/$BINARY"
          fi

      - name: Update package version
        working-directory: platform-packages/${{ matrix.platform }}
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Publish to npm
        working-directory: platform-packages/${{ matrix.platform }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-root-package:
    name: Publish root package (@pulseengine/rivet)
    needs: publish-platform-packages
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        id: version
        env:
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_TAG: ${{ github.event.inputs.version }}
        run: |
          TAG="${INPUT_TAG:-$RUN_BRANCH}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update root package version and optionalDependencies
        working-directory: npm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          jq --arg v "$VERSION" '
            .version = $v |
            .optionalDependencies = {
              "@pulseengine/rivet-darwin-arm64": $v,
              "@pulseengine/rivet-darwin-x64":   $v,
              "@pulseengine/rivet-linux-arm64":  $v,
              "@pulseengine/rivet-linux-x64":    $v,
              "@pulseengine/rivet-win32-x64":    $v
            }
          ' package.json > package.json.tmp
          mv package.json.tmp package.json
          cat package.json

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
            echo "## NPM packages published";
            echo "";
            echo "- \`@pulseengine/rivet@$VERSION\`";
            echo "- \`@pulseengine/rivet-darwin-arm64@$VERSION\`";
            echo "- \`@pulseengine/rivet-darwin-x64@$VERSION\`";
            echo "- \`@pulseengine/rivet-linux-arm64@$VERSION\`";
            echo "- \`@pulseengine/rivet-linux-x64@$VERSION\`";
            echo "- \`@pulseengine/rivet-win32-x64@$VERSION\`";
            echo "";
            echo "### Usage";
            echo '```bash';
            echo "npx @pulseengine/rivet --version";
            echo "claude mcp add rivet npx -y @pulseengine/rivet mcp";
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
