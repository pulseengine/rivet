name: Rivet Delta

# Runs on every PR that touches artifacts, schemas, or `rivet.yaml`.
# Produces a graphical diff of the Rivet artifact graph between the PR's
# merge base and the PR head, posts a markdown summary as a PR comment,
# and uploads the full HTML dashboard + diff JSON as workflow artifacts
# for deep inspection. The comment is updated in place on subsequent
# pushes via a hidden marker (<!-- rivet-delta-bot -->).
#
# v0.4.3: the mermaid diagram is also pre-rendered to SVG and pushed to
# an orphan branch (`rivet-delta-renders`) so the graph shows up in email
# notifications and the GitHub mobile app — both of which display
# ```mermaid fenced blocks as raw source rather than rendering them.
# The interactive mermaid block is still preserved in a collapsed
# <details> below the image for the GitHub web UI.
#
# This is informational — the workflow never blocks a merge. If the diff
# can't be computed (parse errors, missing base, etc.) it posts a
# warning comment instead of failing.

on:
  pull_request:
    paths:
      - "artifacts/**"
      - "schemas/**"
      - "rivet.yaml"
      - "rivet-core/**"
      - "rivet-cli/**"
      - ".github/workflows/rivet-delta.yml"
      - "scripts/diff-to-markdown.mjs"

permissions:
  # `contents: write` needed for the SVG-to-orphan-branch push step.
  # Everything else stays read-only; pull-requests:write is for the
  # comment bot only.
  contents: write
  pull-requests: write

concurrency:
  group: rivet-delta-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  delta:
    name: Artifact delta
    runs-on: ubuntu-latest
    # All user-derived fields are captured into env vars at job scope so
    # no `run:` step interpolates untrusted input into a shell context.
    # base.sha is a 40-char SHA (safe) but enving everything is the
    # GitHub-recommended pattern for workflows that accept PR input.
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      RUN_ID: ${{ github.run_id }}
      REPO: ${{ github.repository }}
      RENDERS_BRANCH: rivet-delta-renders
    steps:
      - name: Checkout head
        uses: actions/checkout@v6
        with:
          path: head
          fetch-depth: 0

      - name: Checkout base
        uses: actions/checkout@v6
        with:
          path: base
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: head

      - name: Build rivet (release)
        working-directory: head
        run: cargo build --release -p rivet-cli

      - name: Run diff (base vs head)
        working-directory: head
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p delta-out
          ./target/release/rivet diff \
            --base "$GITHUB_WORKSPACE/base" \
            --head "$GITHUB_WORKSPACE/head" \
            --format json > delta-out/diff.json 2> delta-out/diff.stderr

      - name: Run impact (since base)
        working-directory: head
        continue-on-error: true
        run: |
          set -euo pipefail
          ./target/release/rivet impact \
            --since "$BASE_SHA" \
            --depth 5 \
            --format json > delta-out/impact.json 2> delta-out/impact.stderr || \
            echo '{"impacts": [], "error": "impact analysis failed"}' > delta-out/impact.json

      - name: Export HTML dashboard for head
        working-directory: head
        continue-on-error: true
        run: |
          set -euo pipefail
          ./target/release/rivet export \
            --format html \
            --output delta-out/html \
            --version-label "pr-$PR_NUMBER" \
            --offline || echo "export failed" > delta-out/export.err

      # Pass 1 — generate markdown AND extract mermaid source to a file.
      # The --svg-url is intentionally omitted; the second pass fills it in
      # once we have the raw URL.
      - name: Generate markdown (pass 1 — emit mermaid source)
        working-directory: head
        run: |
          set -euo pipefail
          node scripts/diff-to-markdown.mjs \
            --diff delta-out/diff.json \
            --impact delta-out/impact.json \
            --pr "$PR_NUMBER" \
            --run "$RUN_ID" \
            --repo "$REPO" \
            --mmd-out delta-out/diagram.mmd \
            > delta-out/comment.md

      # Render the mermaid source to SVG only if the first pass emitted a
      # diagram (empty diffs don't write diagram.mmd).
      - name: Render mermaid → SVG
        id: render
        working-directory: head
        continue-on-error: true
        run: |
          set -euo pipefail
          if [ ! -s delta-out/diagram.mmd ]; then
            echo "no diagram to render (empty diff)"
            echo "rendered=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          npx -y -p @mermaid-js/mermaid-cli@11.4.2 mmdc \
            -i delta-out/diagram.mmd \
            -o delta-out/diagram.svg \
            -b transparent
          echo "rendered=true" >> "$GITHUB_OUTPUT"

      # Push the SVG to a dedicated orphan branch so we get permanent,
      # auth-free raw.githubusercontent.com URLs the email client and
      # mobile app can fetch. Each PR-run gets its own path; history of
      # prior renders stays viewable but can be GC'd by a separate
      # workflow if the branch grows unwieldy.
      - name: Push SVG to renders branch
        if: steps.render.outputs.rendered == 'true'
        id: push_svg
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RENDERS_DIR="$RUNNER_TEMP/renders"
          TARGET_DIR="pr-${PR_NUMBER}/run-${RUN_ID}"
          SVG_PATH="${TARGET_DIR}/diagram.svg"

          # Fetch the orphan branch if it exists; otherwise create it.
          git clone --depth 1 --branch "$RENDERS_BRANCH" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" \
            "$RENDERS_DIR" 2>/dev/null || {
              git clone --depth 1 \
                "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" \
                "$RENDERS_DIR"
              cd "$RENDERS_DIR"
              git checkout --orphan "$RENDERS_BRANCH"
              git rm -rf . 2>/dev/null || true
              cat > README.md <<'EOF'
          # rivet-delta-renders

          Pre-rendered SVG diagrams for `rivet-delta` PR comments.
          Paths: `pr-<N>/run-<RUN_ID>/diagram.svg`.

          This branch is written by `.github/workflows/rivet-delta.yml`
          so the graph embedded in PR comments renders in email
          notifications and the GitHub mobile app (both of which show
          `\`\`\`mermaid` fenced blocks as raw source).

          Safe to prune old directories if size becomes a problem —
          the only consumers are the comment `<img src>` references,
          which become broken on deletion but don't block anything.
          EOF
              git add README.md
              git commit -m "chore: initialize rivet-delta-renders branch"
              git push origin "$RENDERS_BRANCH"
          }

          cd "$RENDERS_DIR"
          mkdir -p "$TARGET_DIR"
          cp "$GITHUB_WORKSPACE/head/delta-out/diagram.svg" "$SVG_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$SVG_PATH"
          git commit -m "render: PR #${PR_NUMBER} run ${RUN_ID}"
          git push origin "$RENDERS_BRANCH"

          SVG_URL="https://raw.githubusercontent.com/${REPO}/${RENDERS_BRANCH}/${SVG_PATH}"
          echo "svg_url=${SVG_URL}" >> "$GITHUB_OUTPUT"

      # Pass 2 — re-generate the markdown with --svg-url so the comment
      # body includes an <img> tag pointing at the raw URL. If the SVG
      # render/push failed we skip this pass and the original
      # mermaid-only comment stays.
      - name: Generate markdown (pass 2 — inject SVG)
        id: summary
        if: steps.push_svg.outputs.svg_url != ''
        working-directory: head
        env:
          SVG_URL: ${{ steps.push_svg.outputs.svg_url }}
        run: |
          set -euo pipefail
          node scripts/diff-to-markdown.mjs \
            --diff delta-out/diff.json \
            --impact delta-out/impact.json \
            --pr "$PR_NUMBER" \
            --run "$RUN_ID" \
            --repo "$REPO" \
            --svg-url "$SVG_URL" \
            > delta-out/comment.md
          echo "comment_file=head/delta-out/comment.md" >> "$GITHUB_OUTPUT"

      # Fallback path — if pass 2 was skipped (no SVG), use the pass-1
      # comment we already generated.
      - name: Expose pass-1 comment as fallback
        if: steps.push_svg.outputs.svg_url == ''
        id: summary_fallback
        working-directory: head
        run: |
          echo "comment_file=head/delta-out/comment.md" >> "$GITHUB_OUTPUT"

      - name: Upload delta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rivet-delta-pr-${{ github.event.pull_request.number }}
          path: head/delta-out/
          retention-days: 14

      - name: Find previous delta comment
        id: find_comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- rivet-delta-bot -->"

      - name: Post or update delta comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find_comment.outputs.comment-id }}
          edit-mode: replace
          body-path: ${{ steps.summary.outputs.comment_file || steps.summary_fallback.outputs.comment_file }}
