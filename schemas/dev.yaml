# Development tracking schema for dogfooding trace on itself.
#
# Lightweight artifact types for tracking requirements, design decisions,
# and features of a software project.

schema:
  name: dev
  version: "0.1.0"
  extends: [common]
  description: >
    Software development tracking types. Used to manage requirements,
    design decisions, and feature tracking within a project.

artifact-types:
  - name: requirement
    description: A functional or non-functional requirement
    fields:
      - name: priority
        type: string
        required: false
        allowed-values: [must, should, could, wont]
      - name: category
        type: string
        required: false
        allowed-values: [functional, non-functional, constraint, interface]
      - name: baseline
        type: string
        required: false
        description: Version baseline this requirement belongs to
      - name: upstream-ref
        type: string
        required: false
        description: Reference to an upstream issue or external tracking item
    link-fields:
      - name: satisfies
        link-type: satisfies
        cardinality: zero-or-many
      - name: derives-from
        link-type: derives-from
        cardinality: zero-or-many
    common-mistakes:
      - problem: "Requirement has no traceability — not satisfied by any design decision or feature"
        fix-command: "rivet link REQ-XXX satisfies DD-XXX"
      - problem: "Using 'implements' instead of 'satisfies' — requirements are satisfied, features implement"
        fix-command: "Check link types: rivet schema links"
    example: |
      - id: REQ-001
        type: requirement
        title: System shall validate artifacts against schemas
        status: approved
        priority: must
        links:
          - type: satisfies
            target: DD-001

  - name: design-decision
    description: An architectural or design decision with rationale
    fields:
      - name: decision
        type: text
        required: false
        description: Concise statement of the decision taken
      - name: rationale
        type: text
        required: true
      - name: alternatives
        type: text
        required: false
      - name: baseline
        type: string
        required: false
        description: Version baseline this decision belongs to
      - name: diagram
        type: text
        required: false
        description: Mermaid or other diagram describing the decision
      - name: source-ref
        type: string
        required: false
        description: Source file reference for the implementation
    link-fields:
      - name: satisfies
        link-type: satisfies
        target-types: [requirement]
        required: true
        cardinality: one-or-many
    common-mistakes:
      - problem: "Design decision without rationale — the 'why' is more important than the 'what'"
        fix-command: "rivet modify DD-XXX --set-field rationale='...'"
      - problem: "Missing link to requirement — every decision must justify which requirement it satisfies"
        fix-command: "rivet link DD-XXX satisfies REQ-XXX"
    example: |
      - id: DD-001
        type: design-decision
        title: Use YAML for artifact storage
        status: approved
        rationale: Human-readable, git-friendly, no database dependency
        alternatives: SQLite, JSON, TOML
        links:
          - type: satisfies
            target: REQ-001

  - name: feature
    description: A user-visible capability or feature
    common-mistakes:
      - problem: "Feature without acceptance criteria — makes verification ambiguous"
        fix-command: "rivet modify FEAT-XXX --set-field acceptance-criteria='[\"Given...\"]'"
    example: |
      - id: FEAT-001
        type: feature
        title: Schema validation engine
        status: approved
        phase: phase-1
        links:
          - type: satisfies
            target: REQ-001
    fields:
      - name: phase
        type: string
        required: false
        allowed-values: [phase-1, phase-2, phase-3, future]
      - name: acceptance-criteria
        type: list<string>
        required: false
        description: >
          Structured acceptance criteria in given/when/then format.
          Each entry is a string like "Given X, When Y, Then Z".
          Use `rivet export --gherkin` to generate .feature files.
      - name: baseline
        type: string
        required: false
        description: Version baseline this feature belongs to
    link-fields:
      - name: satisfies
        link-type: satisfies
        cardinality: one-or-many
      - name: implements
        link-type: implements
        cardinality: zero-or-many

link-types:
  - name: depends-on
    inverse: depended-on-by
    description: Source depends on target being completed first

traceability-rules:
  - name: requirement-coverage
    description: Every requirement should be satisfied by at least one design decision or feature
    source-type: requirement
    required-backlink: satisfies
    from-types: [design-decision, feature]
    severity: warning

  - name: decision-justification
    description: Every design decision must link to at least one requirement
    source-type: design-decision
    required-link: satisfies
    target-types: [requirement]
    severity: error

conditional-rules:
  - name: approved-needs-description
    description: Approved artifacts should have a description
    when:
      field: status
      equals: approved
    then:
      required-fields: [description]
    severity: warning
