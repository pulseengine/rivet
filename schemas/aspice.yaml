# Automotive SPICE V-model schema
#
# Defines artifact types and traceability rules for the full ASPICE V-model.
# Based on Automotive SPICE PAM v4.0.
#
# Left side of V (specification/design):
#   SYS.1  Stakeholder Requirements Analysis
#   SYS.2  System Requirements Analysis
#   SYS.3  System Architectural Design
#   SWE.1  Software Requirements Analysis
#   SWE.2  Software Architectural Design
#   SWE.3  Software Detailed Design and Unit Construction
#
# Right side of V (verification):
#   SWE.4  Software Unit Verification
#   SWE.5  Software Component Verification and Integration Verification
#   SWE.6  Software Verification
#   SYS.4  System Integration and Integration Verification
#   SYS.5  System Verification
#
# Verification execution results (per-version evidence):
#   verification-execution  — a run against a specific version
#   verification-verdict    — pass/fail verdict for a single measure
#
# ASPICE 4.0 key terminology changes:
#   - "test" is now "verification measure" (broader: includes review,
#     static analysis, formal verification, simulation, not just testing)
#   - SWE.5 scope expanded to include component verification
#   - SWE.6/SYS.5 renamed from "qualification test" to "verification"
#
# This schema is reusable across any automotive project.

schema:
  name: aspice
  version: "0.2.0"
  namespace: "http://pulseengine.dev/ns/aspice#"
  extends: [common]
  description: >
    Automotive SPICE v4.0 V-model artifact types and traceability rules.

# ──────────────────────────────────────────────────────────────────────────
# Artifact types
# ──────────────────────────────────────────────────────────────────────────
artifact-types:

  # ── System level (left) ─────────────────────────────────────────────────

  - name: stakeholder-req
    description: Stakeholder requirement (SYS.1)
    aspice-process: SYS.1
    fields:
      - name: priority
        type: string
        required: false
        allowed-values: [must, should, could, wont]
      - name: source
        type: string
        required: false
        description: Origin of the requirement (customer, regulation, standard)
    link-fields: []

  - name: system-req
    description: System requirement derived from stakeholder needs (SYS.2)
    aspice-process: SYS.2
    fields:
      - name: req-type
        type: string
        required: false
        allowed-values: [functional, performance, interface, constraint, safety]
      - name: priority
        type: string
        required: false
      - name: verification-criteria
        type: text
        required: false
        description: Criteria for verifying this requirement (ASPICE 4.0 — verification measures)
    link-fields:
      - name: derived-from
        link-type: derives-from
        target-types: [stakeholder-req]
        required: true
        cardinality: one-or-many

  - name: system-arch-component
    description: System architectural element (SYS.3)
    aspice-process: SYS.3
    fields:
      - name: component-type
        type: string
        required: false
        allowed-values: [hardware, software, mechanical, electrical, mixed]
      - name: interfaces
        type: structured
        required: false
        description: Provided and required interfaces
    link-fields:
      - name: allocated-from
        link-type: allocated-from
        target-types: [system-req]
        required: true
        cardinality: one-or-many

  # ── Software level (left) ───────────────────────────────────────────────

  - name: sw-req
    description: Software requirement (SWE.1)
    aspice-process: SWE.1
    fields:
      - name: req-type
        type: string
        required: false
        allowed-values: [functional, performance, interface, constraint, safety]
      - name: priority
        type: string
        required: false
      - name: verification-criteria
        type: text
        required: false
        description: Criteria for verifying this requirement (ASPICE 4.0 — verification measures)
    link-fields:
      - name: derived-from
        link-type: derives-from
        target-types: [system-req, system-arch-component]
        required: true
        cardinality: one-or-many

  - name: sw-arch-component
    description: Software architectural element (SWE.2)
    aspice-process: SWE.2
    fields:
      - name: interfaces
        type: structured
        required: false
        description: Provided and required interfaces (can reference WIT, IDL, etc.)
      - name: concurrency
        type: string
        required: false
      - name: resource-budgets
        type: structured
        required: false
    link-fields:
      - name: allocated-from
        link-type: allocated-from
        target-types: [sw-req, system-arch-component]
        required: true
        cardinality: one-or-many

  - name: sw-detail-design
    description: Software detailed design or unit specification (SWE.3)
    aspice-process: SWE.3
    fields:
      - name: unit
        type: string
        required: false
        description: Source file path (validated against codebase)
      - name: function
        type: string
        required: false
        description: Function or method name
      - name: algorithm
        type: text
        required: false
        description: Algorithm or state machine description
    link-fields:
      - name: refines
        link-type: refines
        target-types: [sw-arch-component]
        required: true
        cardinality: one-or-many
      - name: satisfies
        link-type: satisfies
        target-types: [sw-req]
        required: false
        cardinality: zero-or-many

  # ── Verification specifications (right side of V) ──────────────────────
  #
  # ASPICE 4.0: "verification measure" replaces "test case".
  # Methods now include static analysis, formal verification, simulation,
  # review, inspection — not just automated/manual testing.

  - name: unit-verification
    description: Unit verification measure (SWE.4 — Software Unit Verification)
    aspice-process: SWE.4
    fields:
      - name: method
        type: string
        required: false
        allowed-values:
          - automated-test
          - manual-test
          - review
          - static-analysis
          - formal-verification
          - simulation
          - inspection
          - walkthrough
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [sw-detail-design]
        required: true
        cardinality: one-or-many

  - name: sw-integration-verification
    description: >
      Software component and integration verification measure
      (SWE.5 — Software Component Verification and Integration Verification)
    aspice-process: SWE.5
    fields:
      - name: method
        type: string
        required: false
        allowed-values:
          - automated-test
          - manual-test
          - review
          - static-analysis
          - formal-verification
          - simulation
          - inspection
          - walkthrough
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [sw-arch-component, sw-detail-design]
        required: true
        cardinality: one-or-many

  - name: sw-verification
    description: >
      Software verification measure against SW requirements
      (SWE.6 — Software Verification)
    aspice-process: SWE.6
    fields:
      - name: method
        type: string
        required: false
        allowed-values:
          - automated-test
          - manual-test
          - review
          - static-analysis
          - formal-verification
          - simulation
          - inspection
          - walkthrough
      - name: priority
        type: string
        required: false
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [sw-req]
        required: true
        cardinality: one-or-many

  - name: sys-integration-verification
    description: >
      System integration and integration verification measure
      (SYS.4 — System Integration and Integration Verification)
    aspice-process: SYS.4
    fields:
      - name: method
        type: string
        required: false
        allowed-values:
          - automated-test
          - manual-test
          - review
          - static-analysis
          - formal-verification
          - simulation
          - inspection
          - walkthrough
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [system-arch-component, system-req]
        required: true
        cardinality: one-or-many

  - name: sys-verification
    description: >
      System verification measure against system requirements
      (SYS.5 — System Verification)
    aspice-process: SYS.5
    fields:
      - name: method
        type: string
        required: false
        allowed-values:
          - automated-test
          - manual-test
          - review
          - static-analysis
          - formal-verification
          - simulation
          - inspection
          - walkthrough
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [system-req]
        required: true
        cardinality: one-or-many

  # ── Verification execution results (per-version evidence) ──────────────

  - name: verification-execution
    description: A verification execution run against a specific version
    fields:
      - name: version
        type: string
        required: true
        description: Version or release identifier
      - name: commit
        type: string
        required: false
      - name: timestamp
        type: string
        required: true
      - name: executor
        type: string
        required: false
        description: Who or what ran the verification (CI system, person)
      - name: environment
        type: structured
        required: false
        description: OS, toolchain, runtime versions
    link-fields: []

  - name: verification-verdict
    description: Pass/fail verdict for a single verification measure in an execution run
    fields:
      - name: verdict
        type: string
        required: true
        allowed-values: [pass, fail, blocked, skipped, error]
      - name: duration-ms
        type: number
        required: false
      - name: evidence
        type: string
        required: false
        description: Path to log file or artifact
      - name: defect
        type: string
        required: false
        description: Issue tracker reference for failures
      - name: failure-reason
        type: text
        required: false
    link-fields:
      - name: measure
        link-type: result-of
        target-types:
          - unit-verification
          - sw-integration-verification
          - sw-verification
          - sys-integration-verification
          - sys-verification
        required: true
        cardinality: exactly-one
      - name: execution
        link-type: part-of-execution
        target-types: [verification-execution]
        required: true
        cardinality: exactly-one

# ──────────────────────────────────────────────────────────────────────────
# ASPICE-specific link types
# ──────────────────────────────────────────────────────────────────────────
link-types:
  - name: result-of
    inverse: has-result
    description: Verification verdict is the result of executing a verification measure
    source-types: [verification-verdict]
    target-types:
      - unit-verification
      - sw-integration-verification
      - sw-verification
      - sys-integration-verification
      - sys-verification

  - name: part-of-execution
    inverse: contains-verdict
    description: Verification verdict belongs to a verification execution run
    source-types: [verification-verdict]
    target-types: [verification-execution]

# ──────────────────────────────────────────────────────────────────────────
# ASPICE traceability rules
#
# These encode the bidirectional traceability requirements from the
# Automotive SPICE PAM v4.0.  `rivet validate` checks these automatically.
# ──────────────────────────────────────────────────────────────────────────
traceability-rules:
  # Forward traceability (left side of V, top-down)
  - name: sys2-derives-from-sys1
    description: Every system requirement must derive from a stakeholder requirement
    source-type: system-req
    required-link: derives-from
    target-types: [stakeholder-req]
    severity: error

  - name: swe1-derives-from-sys
    description: Every SW requirement must derive from a system req or arch component
    source-type: sw-req
    required-link: derives-from
    target-types: [system-req, system-arch-component]
    severity: error

  - name: swe2-allocated-from-swe1
    description: Every SW arch component must be allocated from a SW requirement
    source-type: sw-arch-component
    required-link: allocated-from
    target-types: [sw-req, system-arch-component]
    severity: error

  - name: swe3-refines-swe2
    description: Every detailed design must refine an architecture component
    source-type: sw-detail-design
    required-link: refines
    target-types: [sw-arch-component]
    severity: error

  # Reverse traceability (right side of V, bottom-up verification)
  - name: swe4-verifies-swe3
    description: Every unit verification measure must verify a detailed design element
    source-type: unit-verification
    required-link: verifies
    target-types: [sw-detail-design]
    severity: error

  - name: swe6-verifies-swe1
    description: Every SW verification measure must verify a SW requirement
    source-type: sw-verification
    required-link: verifies
    target-types: [sw-req]
    severity: error

  - name: sys5-verifies-sys2
    description: Every system verification measure must verify a system requirement
    source-type: sys-verification
    required-link: verifies
    target-types: [system-req]
    severity: error

  # Coverage rules (every requirement should be verified)
  - name: swe1-has-verification
    description: Every SW requirement should be verified by at least one verification measure
    source-type: sw-req
    required-backlink: verifies
    from-types: [sw-verification, unit-verification, sw-integration-verification]
    severity: warning

  - name: sys2-has-verification
    description: Every system requirement should be verified by at least one verification measure
    source-type: system-req
    required-backlink: verifies
    from-types: [sys-verification, sys-integration-verification]
    severity: warning

  - name: swe3-has-verification
    description: Every detailed design element should be verified by at least one unit verification measure
    source-type: sw-detail-design
    required-backlink: verifies
    from-types: [unit-verification]
    severity: warning

# ──────────────────────────────────────────────────────────────────────────
# Agent pipelines — Automotive SPICE v4.0 Capability Level 2 evidence
# ──────────────────────────────────────────────────────────────────────────
#
# Three pipelines target the three legs of an ASPICE Level 2 assessment:
#
#   level-2-trace   — bidirectional traceability between work products
#                     (SUP.10 BP1/BP2 + the trace expectations woven through
#                     SYS.2 / SWE.1 / SWE.4 / SWE.6 base practices).
#   level-2-content — required content of each work product
#                     (Automotive SPICE v4.0 Annex B, "Work product outlines").
#   level-2-review  — peer review evidence with reviewer != author
#                     (SUP.9 problem resolution + the GP 2.1.x process
#                     management practices on review records).
#
# What is FUTURE (parses today, but the underlying oracle command is not
# yet implemented; pipeline rows referencing it are inert until the
# oracle lands):
#   - decomposition-coverage      — checks that each higher-level work
#                                   product is fully decomposed into the
#                                   lower-level products required by the
#                                   process.
#   - work-product-content        — checks each work product against its
#                                   Annex B outline.
#   - base-practice-coverage      — checks each base practice in scope has
#                                   evidence of being performed.
#
# Today only `bidirectional-trace` (rivet check bidirectional) and
# `peer-review-signed` (rivet check review-signoff) are wired to real
# CLI subcommands.
agent-pipelines:
  oracles:
    - id: bidirectional-trace
      command: rivet check bidirectional
      description: >
        Bidirectional traceability oracle. Walks every link source -> target
        and confirms the inverse link exists; reports both directions of the
        ASPICE traceability matrix expected by SUP.10.
      applies-to: ["*"]
      fires-on:
        exit-code: nonzero

    # FUTURE: rivet check decomposition-coverage
    # Confirms that every higher-level WP has the required set of
    # lower-level WPs derived from it (e.g. each system-req decomposes
    # into at least one sw-req, each sw-req into at least one
    # sw-arch-element, etc., as required by the relevant base practices).
    - id: decomposition-coverage
      command: rivet check decomposition-coverage
      description: >
        FUTURE oracle. Verifies decomposition completeness across the
        Level 2 V-model: stakeholder-req -> system-req -> sw-req ->
        sw-arch-element -> sw-detail-design.
      applies-to: ["*"]
      fires-on:
        exit-code: nonzero

    # FUTURE: rivet check work-product-content
    # Checks each work product against the outline given in Automotive
    # SPICE v4.0 Annex B ("Work product characteristics"). For example,
    # a stakeholder-req must contain a rationale, a verification criterion,
    # a priority, and a source attribution.
    - id: work-product-content
      command: rivet check work-product-content
      description: >
        FUTURE oracle. Validates work product content against ASPICE v4.0
        Annex B work product outlines. Fires when a required outline
        section is absent on a released artifact.
      applies-to: ["*"]
      fires-on:
        exit-code: nonzero

    - id: peer-review-signed
      command: rivet check review-signoff
      description: >
        Peer-review oracle. Confirms each released work product has a
        review record with reviewer identity != author identity, as
        required by ASPICE GP 2.1.7 / GP 2.2.4 (review of work products).
      applies-to: ["*"]
      fires-on:
        exit-code: nonzero

    # FUTURE: rivet check base-practice-coverage
    # Confirms every base practice (BP) in the assessed processes has
    # at least one work product as evidence of being performed.
    - id: base-practice-coverage
      command: rivet check base-practice-coverage
      description: >
        FUTURE oracle. For each ASPICE process in scope, verifies every
        base practice has a corresponding work product produced.
      applies-to: ["*"]
      fires-on:
        exit-code: nonzero

  pipelines:

    # ── level-2-trace ───────────────────────────────────────────────────
    level-2-trace:
      description: >
        Bidirectional traceability and decomposition coverage between
        ASPICE V-model work products. Targets SUP.10 BP1/BP2 (consistency
        of traceability) and the cross-process trace expectations of SYS.2,
        SWE.1, SWE.4, SWE.6.
      template-kind: structural
      uses-oracles: [bidirectional-trace, decomposition-coverage]
      rank-by:
        - when: { oracle: bidirectional-trace, severity: error }
          weight: 50
          label: "missing inverse link (SUP.10 BP1)"
        - when: { oracle: decomposition-coverage, severity: error }
          weight: 75
          label: "decomposition incomplete (Level 2 blocker)"
      auto-close:
        # Only the simplest mechanical case auto-closes: the inverse link
        # is missing but the target artifact already exists in the store,
        # so the CLI can write the back-link without inventing content.
        - when:
            oracle: bidirectional-trace
            closure-kind: missing-inverse-link
            target-exists: true
          reviewers: ["{context.review-roles.dev-team}"]
      human-review-required:
        - when: { oracle: bidirectional-trace, closure-kind: missing-inverse-link, target-exists: false }
          reviewers: ["{context.review-roles.dev-team}"]
          draft-template: templates/stubs/missing-target-stub.yaml.tmpl  # FUTURE template
        - when: { oracle: decomposition-coverage }
          reviewers: ["{context.review-roles.dev-team}"]
      emit:
        trailer: "Refs: {target_id}"
        change-control: pr-review

    # ── level-2-content ─────────────────────────────────────────────────
    level-2-content:
      description: >
        Work product content compliance vs the Annex B outlines of
        Automotive SPICE v4.0. Each released work product must populate
        its required outline sections; missing sections are flagged for
        a process-lead to author (cannot be machine-synthesised).
      template-kind: content  # FUTURE kind
      uses-oracles: [work-product-content]
      rank-by:
        - when: { oracle: work-product-content, fires-on: missing-required-section }
          weight: 40
          label: "WP outline section missing (Annex B)"
      # Auto-close: NONE. Work product content requires human authorship;
      # the CLI cannot mechanically synthesise rationale, criteria, or
      # attribution text.
      auto-close: []
      human-review-required:
        - when: { oracle: work-product-content }
          reviewers: ["{context.review-roles.process-lead}"]
          # FUTURE template — `rivet-core::templates` is being authored
          # in a parallel work-stream and will populate this stub.
          draft-template: templates/stubs/wp-sections.yaml.tmpl
      emit:
        trailer: "Refs: {target_id}"
        change-control: pr-review

    # ── level-2-review ──────────────────────────────────────────────────
    level-2-review:
      description: >
        Peer review evidence: every released work product has a review
        record with reviewer != author. Implements GP 2.1.7 (review of
        process performance) / GP 2.2.4 (review work products) and the
        base-practice coverage check that all process BPs are evidenced.
      template-kind: review  # FUTURE kind
      uses-oracles: [peer-review-signed, base-practice-coverage]
      rank-by:
        - when: { oracle: peer-review-signed, fires-on: reviewer-equals-author }
          weight: 60
          label: "released WP has no independent reviewer"
        - when: { oracle: base-practice-coverage, severity: error }
          weight: 45
          label: "base practice has no evidence"
      # Auto-close: NONE. Review activity cannot be synthesised post-hoc.
      auto-close: []
      human-review-required:
        - when: { oracle: peer-review-signed }
          reviewers: ["{context.review-roles.process-lead}"]
          # No draft-template: the action is "convene a review", not "draft content".
        - when: { oracle: base-practice-coverage }
          reviewers: ["{context.review-roles.process-lead}"]
      emit:
        trailer: "Refs: {target_id}"
        change-control: pr-review
