# Automotive SPICE V-model schema
#
# Defines artifact types and traceability rules for the full ASPICE V-model.
# Based on Automotive SPICE PAM v4.0.
#
# Left side of V (specification/design):
#   SYS.1  Stakeholder requirements
#   SYS.2  System requirements
#   SYS.3  System architecture
#   SWE.1  Software requirements
#   SWE.2  Software architecture
#   SWE.3  Software detailed design / unit construction
#
# Right side of V (verification/testing):
#   SWE.4  Unit verification
#   SWE.5  Integration verification
#   SWE.6  Software qualification testing
#   SYS.4  System integration testing
#   SYS.5  System qualification testing
#
# Test execution results (per-version evidence):
#   test-execution  — a run against a specific version
#   test-verdict    — pass/fail verdict for a single test case
#
# This schema is reusable across any automotive project.

schema:
  name: aspice
  version: "0.1.0"
  namespace: "http://pulseengine.dev/ns/aspice#"
  extends: [common]
  description: >
    Automotive SPICE V-model artifact types and traceability rules.

# ──────────────────────────────────────────────────────────────────────────
# Artifact types
# ──────────────────────────────────────────────────────────────────────────
artifact-types:

  # ── System level (left) ─────────────────────────────────────────────────

  - name: stakeholder-req
    description: Stakeholder requirement (SYS.1)
    aspice-process: SYS.1
    fields:
      - name: priority
        type: string
        required: false
        allowed-values: [must, should, could, wont]
      - name: source
        type: string
        required: false
        description: Origin of the requirement (customer, regulation, standard)
    link-fields: []

  - name: system-req
    description: System requirement derived from stakeholder needs (SYS.2)
    aspice-process: SYS.2
    fields:
      - name: req-type
        type: string
        required: false
        allowed-values: [functional, performance, interface, constraint, safety]
      - name: priority
        type: string
        required: false
    link-fields:
      - name: derived-from
        link-type: derives-from
        target-types: [stakeholder-req]
        required: true
        cardinality: one-or-many

  - name: system-arch-component
    description: System architectural element (SYS.3)
    aspice-process: SYS.3
    fields:
      - name: component-type
        type: string
        required: false
        allowed-values: [hardware, software, mechanical, electrical, mixed]
      - name: interfaces
        type: structured
        required: false
        description: Provided and required interfaces
    link-fields:
      - name: allocated-from
        link-type: allocated-from
        target-types: [system-req]
        required: true
        cardinality: one-or-many

  # ── Software level (left) ───────────────────────────────────────────────

  - name: sw-req
    description: Software requirement (SWE.1)
    aspice-process: SWE.1
    fields:
      - name: req-type
        type: string
        required: false
        allowed-values: [functional, performance, interface, constraint, safety]
      - name: priority
        type: string
        required: false
    link-fields:
      - name: derived-from
        link-type: derives-from
        target-types: [system-req, system-arch-component]
        required: true
        cardinality: one-or-many

  - name: sw-arch-component
    description: Software architectural element (SWE.2)
    aspice-process: SWE.2
    fields:
      - name: interfaces
        type: structured
        required: false
        description: Provided and required interfaces (can reference WIT, IDL, etc.)
      - name: concurrency
        type: string
        required: false
      - name: resource-budgets
        type: structured
        required: false
    link-fields:
      - name: allocated-from
        link-type: allocated-from
        target-types: [sw-req, system-arch-component]
        required: true
        cardinality: one-or-many

  - name: sw-detail-design
    description: Software detailed design or unit specification (SWE.3)
    aspice-process: SWE.3
    fields:
      - name: unit
        type: string
        required: false
        description: Source file path (validated against codebase)
      - name: function
        type: string
        required: false
        description: Function or method name
      - name: algorithm
        type: text
        required: false
        description: Algorithm or state machine description
    link-fields:
      - name: refines
        link-type: refines
        target-types: [sw-arch-component]
        required: true
        cardinality: one-or-many
      - name: satisfies
        link-type: satisfies
        target-types: [sw-req]
        required: false
        cardinality: zero-or-many

  # ── Test specifications (right side of V) ───────────────────────────────

  - name: unit-test
    description: Unit verification test specification (SWE.4)
    aspice-process: SWE.4
    fields:
      - name: method
        type: string
        required: false
        allowed-values: [automated, manual, review, analysis]
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [sw-detail-design]
        required: true
        cardinality: one-or-many

  - name: integration-test
    description: Software integration test specification (SWE.5)
    aspice-process: SWE.5
    fields:
      - name: method
        type: string
        required: false
        allowed-values: [automated, manual, review, analysis]
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [sw-arch-component, sw-detail-design]
        required: true
        cardinality: one-or-many

  - name: sw-qual-test
    description: Software qualification test specification (SWE.6)
    aspice-process: SWE.6
    fields:
      - name: method
        type: string
        required: false
        allowed-values: [automated, manual, review, analysis]
      - name: priority
        type: string
        required: false
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [sw-req]
        required: true
        cardinality: one-or-many

  - name: sys-integration-test
    description: System integration test specification (SYS.4)
    aspice-process: SYS.4
    fields:
      - name: method
        type: string
        required: false
        allowed-values: [automated, manual, review, analysis]
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [system-arch-component, system-req]
        required: true
        cardinality: one-or-many

  - name: sys-qual-test
    description: System qualification test specification (SYS.5)
    aspice-process: SYS.5
    fields:
      - name: method
        type: string
        required: false
        allowed-values: [automated, manual, review, analysis]
      - name: preconditions
        type: list<string>
        required: false
      - name: steps
        type: structured
        required: false
    link-fields:
      - name: verifies
        link-type: verifies
        target-types: [system-req]
        required: true
        cardinality: one-or-many

  # ── Test execution results (per-version evidence) ───────────────────────

  - name: test-execution
    description: A test execution run against a specific version
    fields:
      - name: version
        type: string
        required: true
        description: Version or release identifier
      - name: commit
        type: string
        required: false
      - name: timestamp
        type: string
        required: true
      - name: executor
        type: string
        required: false
        description: Who or what ran the tests (CI system, person)
      - name: environment
        type: structured
        required: false
        description: OS, toolchain, runtime versions
    link-fields: []

  - name: test-verdict
    description: Pass/fail verdict for a single test case in an execution run
    fields:
      - name: verdict
        type: string
        required: true
        allowed-values: [pass, fail, blocked, skipped, error]
      - name: duration-ms
        type: number
        required: false
      - name: evidence
        type: string
        required: false
        description: Path to log file or artifact
      - name: defect
        type: string
        required: false
        description: Issue tracker reference for failures
      - name: failure-reason
        type: text
        required: false
    link-fields:
      - name: test
        link-type: result-of
        target-types: [unit-test, integration-test, sw-qual-test, sys-integration-test, sys-qual-test]
        required: true
        cardinality: exactly-one
      - name: execution
        link-type: part-of-execution
        target-types: [test-execution]
        required: true
        cardinality: exactly-one

# ──────────────────────────────────────────────────────────────────────────
# ASPICE-specific link types
# ──────────────────────────────────────────────────────────────────────────
link-types:
  - name: result-of
    inverse: has-result
    description: Test verdict is the result of executing a test specification
    source-types: [test-verdict]
    target-types: [unit-test, integration-test, sw-qual-test, sys-integration-test, sys-qual-test]

  - name: part-of-execution
    inverse: contains-verdict
    description: Test verdict belongs to a test execution run
    source-types: [test-verdict]
    target-types: [test-execution]

# ──────────────────────────────────────────────────────────────────────────
# ASPICE traceability rules
#
# These encode the bidirectional traceability requirements from the
# Automotive SPICE PAM.  `trace validate` checks these automatically.
# ──────────────────────────────────────────────────────────────────────────
traceability-rules:
  # Forward traceability (left side of V, top-down)
  - name: sys2-derives-from-sys1
    description: Every system requirement must derive from a stakeholder requirement
    source-type: system-req
    required-link: derives-from
    target-types: [stakeholder-req]
    severity: error

  - name: swe1-derives-from-sys
    description: Every SW requirement must derive from a system req or arch component
    source-type: sw-req
    required-link: derives-from
    target-types: [system-req, system-arch-component]
    severity: error

  - name: swe2-allocated-from-swe1
    description: Every SW arch component must be allocated from a SW requirement
    source-type: sw-arch-component
    required-link: allocated-from
    target-types: [sw-req, system-arch-component]
    severity: error

  - name: swe3-refines-swe2
    description: Every detailed design must refine an architecture component
    source-type: sw-detail-design
    required-link: refines
    target-types: [sw-arch-component]
    severity: error

  # Reverse traceability (right side of V, bottom-up verification)
  - name: swe4-verifies-swe3
    description: Every unit test must verify a detailed design element
    source-type: unit-test
    required-link: verifies
    target-types: [sw-detail-design]
    severity: error

  - name: swe6-verifies-swe1
    description: Every SW qualification test must verify a SW requirement
    source-type: sw-qual-test
    required-link: verifies
    target-types: [sw-req]
    severity: error

  - name: sys5-verifies-sys2
    description: Every system qualification test must verify a system requirement
    source-type: sys-qual-test
    required-link: verifies
    target-types: [system-req]
    severity: error

  # Coverage rules (every requirement should be verified)
  - name: swe1-has-test
    description: Every SW requirement should be verified by at least one test
    source-type: sw-req
    required-backlink: verifies
    from-types: [sw-qual-test, unit-test, integration-test]
    severity: warning

  - name: sys2-has-test
    description: Every system requirement should be verified by at least one test
    source-type: system-req
    required-backlink: verifies
    from-types: [sys-qual-test, sys-integration-test]
    severity: warning

  - name: swe3-has-test
    description: Every detailed design element should be verified by at least one unit test
    source-type: sw-detail-design
    required-backlink: verifies
    from-types: [unit-test]
    severity: warning
