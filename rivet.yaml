project:
  name: rivet
  version: "0.1.0"
  schemas:
    - common
    - dev
    - aadl
    - stpa

sources:
  - path: artifacts
    format: generic-yaml
  - path: safety/stpa
    format: stpa-yaml

docs:
  - docs
  - arch

results: results

commits:
  format: trailers
  trailers:
    Implements: implements
    Fixes: fixes
    Verifies: verifies
    Satisfies: satisfies
    Refs: traces-to
  exempt-types:
    - chore
    - style
    - ci
    - docs
    - build
  skip-trailer: "Trace: skip"
  traced-paths:
    - rivet-core/src/
    - rivet-cli/src/
